version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zora-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: zora-postgres
    environment:
      POSTGRES_DB: zora
      POSTGRES_USER: zora
      POSTGRES_PASSWORD: zora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data: