version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zora-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: zora-postgres
    environment:
      POSTGRES_DB: zora
      POSTGRES_USER: zora
      POSTGRES_PASSWORD: zora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zora-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: zora-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    command: serve

volumes:
  qdrant_data:
  postgres_data:
  ollama_models:
