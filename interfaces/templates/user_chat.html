<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORA – Геоаналитика и помощник</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            padding: 8px;
            gap: 8px;
        }

        /* ===== ЛЕВАЯ ПАНЕЛЬ ===== */
        .left-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .left-card {
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .left-card-header {
            padding: 10px 14px;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }
        .left-card-header .toggle-icon {
            font-size: 10px;
            color: #8b949e;
            transition: transform 0.2s;
        }
        .left-card-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }
        .left-card-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            max-height: 200px;
            transition: max-height 0.3s;
        }
        .left-card-body.collapsed {
            max-height: 0;
            padding: 0 8px;
            overflow: hidden;
        }
        .list-item {
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            background: #21262d;
            transition: background 0.15s;
            font-size: 12px;
        }
        .list-item:hover { background: #1f6feb; color: white; }
        .list-item.active { background: #1f6feb; color: white; }
        .list-item .item-title { font-weight: 600; font-size: 13px; }
        .list-item .item-sub { font-size: 11px; color: #8b949e; margin-top: 2px; }
        .list-item:hover .item-sub { color: #c9d1d9; }
        .list-item .status-badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .status-badge.active { background: #3fb950; color: #0d1117; }
        .status-badge.lost { background: #da3633; color: white; }
        .status-badge.pending { background: #d29922; color: #0d1117; }

        .district-stats {
            background: #0d1117;
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            font-size: 12px;
            display: none;
        }
        .district-stats.visible { display: block; }
        .district-stats .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #21262d;
        }
        .district-stats .stat-row:last-child { border-bottom: none; }

        /* ===== ЦЕНТРАЛЬНАЯ ПАНЕЛЬ (КАРТА) ===== */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .map-container {
            flex: 1;
            background: #0d1117;
            border-radius: 12px;
            border: 1px solid #2d333b;
            overflow: hidden;
        }
        #map { height: 100%; width: 100%; }

        /* ===== ПРАВАЯ ПАНЕЛЬ (ЧАТ) ===== */
        .right-panel {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .search-panel {
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            overflow: hidden;
        }
        .search-header {
            padding: 8px 12px;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
            font-size: 12px;
            font-weight: 600;
        }
        .search-input-area {
            display: flex;
            padding: 8px;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #2d333b;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e6edf3;
            outline: none;
        }
        .search-btn {
            background: #2f81f7;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            padding: 8px;
            border-top: 1px solid #2d333b;
        }
        .search-result-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            background: #21262d;
        }
        .search-result-item:hover { background: #1f6feb; }

        .chats-list-panel {
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            padding: 12px;
        }
        .chats-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 13px;
        }
        .chats-actions button {
            background: #21262d;
            border: none;
            color: #c9d1d9;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-left: 6px;
            cursor: pointer;
        }
        .chats-list {
            max-height: 150px;
            overflow-y: auto;
        }
        .chat-item {
            padding: 8px 12px;
            background: #21262d;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-item.active { background: #1f6feb; color: white; }

        .chat-messages {
            flex: 1;
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px;
            border-bottom: 1px solid #2d333b;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-title { font-weight: 600; font-size: 13px; }
        .chat-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header-actions button {
            background: none;
            border: none;
            color: #c9d1d9;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .chat-header-actions button:hover { color: #2f81f7; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 6px 10px;
            border-radius: 10px;
            max-width: 85%;
            width: fit-content;
            font-size: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background: #1f6feb;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .assistant-message {
            background: #2d333b;
            color: #e6edf3;
            align-self: flex-start;
            margin-right: auto;
        }
        .message-content { font-size: 12px; white-space: pre-wrap; word-wrap: break-word; }
        .message-header { font-size: 10px; color: #8b949e; margin-bottom: 4px; }
        .system-message { background: #0d1117; color: #8b949e; font-size: 12px; text-align: center; }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #2d333b;
        }
        .chat-textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #2d333b;
            border-radius: 8px;
            padding: 10px;
            color: #e6edf3;
            resize: none;
            font-family: inherit;
        }
        .chat-send {
            margin-top: 8px;
            width: 100%;
            background: #2f81f7;
            border: none;
            padding: 8px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .chat-send:hover { background: #1a6bbf; }

        .feedback-buttons {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            font-size: 0.8em;
            opacity: 0.7;
        }
        .assistant-message:hover .feedback-buttons { opacity: 1; }
        .feedback-buttons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            padding: 2px 6px;
            border-radius: 12px;
            color: #e6edf3;
        }
        .feedback-buttons button:hover { background: #444c56; }

        button { background: #21262d; border: none; padding: 6px 12px; border-radius: 6px; color: white; cursor: pointer; }
        button.primary { background: #2f81f7; }
        button.danger { background: #da3633; }

        .leaflet-container { background: #1a1d23; }
        .leaflet-popup-content-wrapper { background: #151b23; color: #e6edf3; border: 1px solid #2d333b; }
        .leaflet-popup-tip { background: #151b23; }
        .leaflet-control-zoom a { background: #21262d; color: #e6edf3; border: 1px solid #2d333b; }
        .leaflet-control-zoom a:hover { background: #2d333b; }
    </style>
</head>
<body>
<div class="app">
    <!-- ===== ЛЕВАЯ ПАНЕЛЬ ===== -->
    <div class="left-panel">
        <div class="left-card">
            <div class="left-card-header" onclick="toggleSection('clientsBody')">
                <span>👥 КЛИЕНТЫ</span>
                <span class="toggle-icon" id="clientsToggle">▼</span>
            </div>
            <div class="left-card-body" id="clientsBody">
                <div id="clientsList"></div>
                <div class="district-stats" id="districtStats"></div>
            </div>
        </div>
        <div class="left-card">
            <div class="left-card-header" onclick="toggleSection('repsBody')">
                <span>👤 ТОРГОВЫЕ ПРЕДСТАВИТЕЛИ</span>
                <span class="toggle-icon" id="repsToggle">▼</span>
            </div>
            <div class="left-card-body" id="repsBody">
                <div id="repsList"></div>
            </div>
        </div>
        <div class="left-card">
            <div class="left-card-header" onclick="toggleSection('zonesBody')">
                <span>🚚 ЗОНЫ ДОСТАВКИ</span>
                <span class="toggle-icon" id="zonesToggle">▼</span>
            </div>
            <div class="left-card-body" id="zonesBody">
                <div id="zonesList"></div>
            </div>
        </div>
    </div>

    <!-- ===== ЦЕНТРАЛЬНАЯ ПАНЕЛЬ (КАРТА) ===== -->
    <div class="center-panel">
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- ===== ПРАВАЯ ПАНЕЛЬ (ЧАТ) ===== -->
    <div class="right-panel">
        <div class="search-panel">
            <div class="search-header">🔍 ПОИСК В ИСТОРИИ</div>
            <div class="search-input-area">
                <input type="text" id="searchInput" placeholder="Поиск по диалогам..." class="search-input">
                <button onclick="searchHistory()" class="search-btn">🔍</button>
            </div>
            <div class="search-results" id="searchResults" style="display: none;"></div>
        </div>
        <div class="chats-list-panel">
            <div class="chats-header">
                <span>💬 ЧАТЫ</span>
                <div class="chats-actions">
                    <button onclick="createNewChat()">+ Новый</button>
                    <button onclick="deleteCurrentChat()">🗑</button>
                </div>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        <div class="chat-messages">
            <div class="chat-header">
                <div class="chat-title">💬 ЧАТ С ZORA</div>
                <div class="chat-header-actions">
                    <button onclick="toggleTheme()" id="themeToggleBtn" title="Тема">🌙</button>
                    <button onclick="exportChat()" title="Экспорт">📄</button>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="chat-input-area">
                <textarea class="chat-textarea" id="chatInput" rows="2" placeholder="Спросите ZORA... (Enter для отправки)"></textarea>
                <button class="chat-send" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>
</div>

<script>
// ======================================================================
// 1. ДАННЫЕ
// ======================================================================
const clientsData = [
    { id: 1, name: 'ООО "КрымТорг"', status: 'active', address: 'Симферополь, ул. Ленина 15', lat: 44.95, lng: 34.10, district: 'crimea', rep: 'Иванов А.А.' },
    { id: 2, name: 'ИП Петров В.С.', status: 'active', address: 'Херсон, пр. Ушакова 42', lat: 46.63, lng: 32.58, district: 'kherson', rep: 'Петрова Е.М.' },
    { id: 3, name: 'ООО "АзовТрейд"', status: 'lost', address: 'Мелитополь, ул. Гетмана 8', lat: 46.84, lng: 35.36, district: 'zaporozhye', rep: 'Сидоров К.П.' },
    { id: 4, name: 'ЧП "Бердянск-Рыба"', status: 'active', address: 'Бердянск, ул. Морская 3', lat: 46.76, lng: 36.79, district: 'zaporozhye', rep: 'Иванов А.А.' },
    { id: 5, name: 'ООО "Керчь-Логистика"', status: 'active', address: 'Керчь, ул. Кирова 22', lat: 45.36, lng: 36.47, district: 'crimea', rep: 'Козлов Д.Н.' },
    { id: 6, name: 'ИП Сидоренко О.И.', status: 'lost', address: 'Симферополь, ул. Севастопольская 5', lat: 44.93, lng: 34.08, district: 'crimea', rep: 'Петрова Е.М.' },
    { id: 7, name: 'ООО "Таврия-Агро"', status: 'active', address: 'Херсонская обл., с. Новотроицкое', lat: 46.55, lng: 32.70, district: 'kherson', rep: 'Сидоров К.П.' },
    { id: 8, name: 'ЧП "Приазовье"', status: 'pending', address: 'Запорожская обл., пгт. Приазовское', lat: 46.73, lng: 35.65, district: 'zaporozhye', rep: 'Козлов Д.Н.' },
];
const repsData = [
    { id: 1, name: 'Иванов Александр Алексеевич', zone: 'Крым', phone: '+7 (978) 111-22-33', clients: 3 },
    { id: 2, name: 'Петрова Елена Михайловна', zone: 'Херсонская обл.', phone: '+7 (990) 222-33-44', clients: 2 },
    { id: 3, name: 'Сидоров Константин Петрович', zone: 'Запорожская обл.', phone: '+7 (990) 333-44-55', clients: 2 },
    { id: 4, name: 'Козлов Дмитрий Николаевич', zone: 'Крым / Запорожье', phone: '+7 (978) 444-55-66', clients: 2 },
];
const zonesData = [
    { id: 1, name: 'Центральный Крым', lat: 44.95, lng: 34.10, radius: 40000, color: '#3fb950' },
    { id: 2, name: 'Херсонское направление', lat: 46.63, lng: 32.58, radius: 50000, color: '#2f81f7' },
    { id: 3, name: 'Приазовье', lat: 46.80, lng: 35.80, radius: 45000, color: '#d29922' },
];
const districtPolygons = {
    crimea: {
        name: 'Крым',
        coords: [[46.0,33.0],[46.0,34.5],[45.5,35.5],[45.0,36.0],[44.5,36.0],[44.4,35.5],[44.4,34.5],[44.5,33.5],[44.8,33.0],[45.5,32.5],[46.0,33.0]],
        color: '#3fb950',
        stats: { total: 3, active: 2, lost: 1, pending: 0, rep: 'Иванов А.А., Козлов Д.Н.' }
    },
    kherson: {
        name: 'Херсонская область',
        coords: [[47.0,32.0],[47.0,33.5],[46.5,34.0],[46.0,33.5],[46.0,32.5],[46.2,32.0],[46.5,31.5],[47.0,32.0]],
        color: '#2f81f7',
        stats: { total: 2, active: 2, lost: 0, pending: 0, rep: 'Петрова Е.М., Сидоров К.П.' }
    },
    zaporozhye: {
        name: 'Запорожская область',
        coords: [[47.5,35.0],[47.5,36.5],[47.0,37.0],[46.5,37.0],[46.3,36.5],[46.3,35.5],[46.5,35.0],[47.0,34.5],[47.5,35.0]],
        color: '#d29922',
        stats: { total: 3, active: 1, lost: 1, pending: 1, rep: 'Сидоров К.П., Козлов Д.Н.' }
    }
};

// ======================================================================
// 2. КАРТА
// ======================================================================
let map, clientMarkers = [], zoneCircles = [], districtLayers = {};
let currentTheme = localStorage.getItem('zora_user_theme') || 'dark';

function initMap() {
    map = L.map('map', { center: [45.5, 34.5], zoom: 8 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 18 }).addTo(map);

    for (const [key, d] of Object.entries(districtPolygons)) {
        const p = L.polygon(d.coords, { color: d.color, fillColor: d.color, fillOpacity: 0.15, weight: 2 }).addTo(map);
        p.on('click', function() { showDistrictStats(key); map.fitBounds(this.getBounds(), {padding:[30,30]}); });
        p.bindPopup(`<b>${d.name}</b><br>Клиентов: ${d.stats.total}<br>Активных: ${d.stats.active}<br>Потерянных: ${d.stats.lost}`);
        districtLayers[key] = p;
    }

    for (const c of clientsData) {
        const ic = c.status === 'active' ? '#3fb950' : (c.status === 'lost' ? '#da3633' : '#d29922');
        const icon = L.divIcon({ className: 'custom-marker', html: `<div style="background:${ic};width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>`, iconSize: [14,14], iconAnchor: [7,7] });
        const m = L.marker([c.lat, c.lng], { icon }).addTo(map);
        m.bindPopup(`<b>${c.name}</b><br>${c.address}<br>Статус: ${c.status === 'active' ? '✅ Активен' : (c.status === 'lost' ? '❌ Потерян' : '⏳ В обработке')}<br>Торгпред: ${c.rep}`);
        m.clientId = c.id;
        clientMarkers.push(m);
    }

    for (const z of zonesData) {
        const circle = L.circle([z.lat, z.lng], { radius: z.radius, color: z.color, fillColor: z.color, fillOpacity: 0.08, weight: 1 }).addTo(map);
        circle.bindPopup(`<b>${z.name}</b><br>Радиус: ${z.radius/1000} км`);
        zoneCircles.push(circle);
    }
    setTimeout(() => map.invalidateSize(), 500);
}

// ======================================================================
// 3. ЛЕВАЯ ПАНЕЛЬ
// ======================================================================
function renderClients() {
    const el = document.getElementById('clientsList');
    el.innerHTML = '';
    for (const c of clientsData) {
        const d = document.createElement('div');
        d.className = 'list-item';
        d.innerHTML = `<div class="item-title">${c.name} <span class="status-badge ${c.status}">${c.status === 'active' ? 'Активен' : (c.status === 'lost' ? 'Потерян' : 'В обработке')}</span></div><div class="item-sub">${c.address}</div>`;
        d.onclick = function() { focusClient(c.id); document.querySelectorAll('#clientsList .list-item').forEach(e => e.classList.remove('active')); this.classList.add('active'); };
        el.appendChild(d);
    }
}
function renderReps() {
    const el = document.getElementById('repsList');
    el.innerHTML = '';
    for (const r of repsData) {
        const d = document.createElement('div');
        d.className = 'list-item';
        d.innerHTML = `<div class="item-title">${r.name}</div><div class="item-sub">📌 ${r.zone} | 📞 ${r.phone} | 👥 ${r.clients} клиентов</div>`;
        el.appendChild(d);
    }
}
function renderZones() {
    const el = document.getElementById('zonesList');
    el.innerHTML = '';
    for (const z of zonesData) {
        const d = document.createElement('div');
        d.className = 'list-item';
        d.innerHTML = `<div class="item-title">🚚 ${z.name}</div><div class="item-sub">Радиус: ${z.radius/1000} км</div>`;
        d.onclick = function() { focusZone(z.id); document.querySelectorAll('#zonesList .list-item').forEach(e => e.classList.remove('active')); this.classList.add('active'); };
        el.appendChild(d);
    }
}

// ======================================================================
// 4. ВЗАИМОДЕЙСТВИЕ
// ======================================================================
function focusClient(id) {
    const c = clientsData.find(x => x.id === id);
    if (!c) return;
    map.setView([c.lat, c.lng], 12);
    const m = clientMarkers.find(x => x.clientId === id);
    if (m) m.openPopup();
}
function focusZone(id) {
    const z = zonesData.find(x => x.id === id);
    if (!z) return;
    map.setView([z.lat, z.lng], 10);
    if (zoneCircles[id-1]) zoneCircles[id-1].openPopup();
}
function showDistrictStats(key) {
    const d = districtPolygons[key];
    if (!d) return;
    const s = document.getElementById('districtStats');
    s.innerHTML = `<div style="font-weight:600;margin-bottom:6px;color:${d.color};">📊 ${d.name}</div>
        <div class="stat-row"><span>Всего клиентов</span><span>${d.stats.total}</span></div>
        <div class="stat-row"><span>✅ Активных</span><span>${d.stats.active}</span></div>
        <div class="stat-row"><span>❌ Потерянных</span><span>${d.stats.lost}</span></div>
        <div class="stat-row"><span>⏳ В обработке</span><span>${d.stats.pending}</span></div>
        <div class="stat-row"><span>👤 Торгпреды</span><span>${d.stats.rep}</span></div>`;
    s.classList.add('visible');
}
function toggleSection(bodyId) {
    const b = document.getElementById(bodyId);
    const t = document.getElementById(bodyId.replace('Body', 'Toggle'));
    b.classList.toggle('collapsed');
    if (t) t.classList.toggle('collapsed');
}

// ======================================================================
// 5. ЧАТ
// ======================================================================
let currentChatId = 'default';
let chats = {};

async function loadChats() {
    try {
        const r = await fetch('/api/chats');
        const d = await r.json();
        if (d.success) {
            chats = {};
            for (let c of d.chats) chats[c.chat_id] = { id: c.chat_id, name: c.name, messages: [] };
        }
    } catch(e) { console.error(e); }
    if (!chats.default) {
        try { await fetch('/api/chats', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:'default',name:'Основной чат'}) }); } catch(e) {}
        chats.default = { id:'default', name:'Основной чат', messages:[] };
    }
    renderChatsList();
}

async function loadMessages(chatId) {
    try {
        const r = await fetch(`/api/chats/${chatId}/messages?limit=50`);
        const d = await r.json();
        if (d.success) {
            if (!chats[chatId]) chats[chatId] = { id:chatId, name:'Чат', messages:[] };
            chats[chatId].messages = d.messages.map(m => ({ text:m.content, isUser:m.role==='user', id:m.message_id, agent:m.agent }));
        }
    } catch(e) { console.error(e); }
}

async function restoreCurrentChat() {
    document.getElementById('messagesArea').innerHTML = '';
    await loadMessages(currentChatId);
    const msgs = chats[currentChatId]?.messages || [];
    for (let m of msgs) addMessageToDOM(m.text, m.isUser, m.id, m.agent);
}

async function saveMessageToServer(chatId, messageId, role, content, agent) {
    try { await fetch(`/api/chats/${chatId}/messages`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message_id:messageId,role,content,agent}) }); } catch(e) { console.error(e); }
}

function renderChatsList() {
    const list = document.getElementById('chatsList');
    list.innerHTML = '';
    for (const [id, chat] of Object.entries(chats)) {
        const d = document.createElement('div');
        d.className = 'chat-item' + (id === currentChatId ? ' active' : '');
        d.innerHTML = `<span>${chat.name}</span><span style="font-size:10px;color:#8b949e;">${chat.messages?.length || 0}</span>`;
        d.onclick = () => switchChat(id);
        list.appendChild(d);
    }
}

async function switchChat(chatId) {
    currentChatId = chatId;
    renderChatsList();
    await restoreCurrentChat();
}

async function createNewChat() {
    const chatId = 'chat_' + Date.now();
    try {
        await fetch('/api/chats', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:chatId,name:'Новый чат'}) });
        chats[chatId] = { id:chatId, name:'Новый чат', messages:[] };
        await switchChat(chatId);
    } catch(e) { console.error(e); }
}

async function deleteCurrentChat() {
    if (!currentChatId || currentChatId === 'default') return;
    try {
        await fetch(`/api/chats/${currentChatId}`, { method:'DELETE' });
        delete chats[currentChatId];
        await switchChat('default');
    } catch(e) { console.error(e); }
}

function addMessageToDOM(text, isUser, msgId, agent) {
    const area = document.getElementById('messagesArea');
    const d = document.createElement('div');
    d.className = 'message ' + (isUser ? 'user-message' : 'assistant-message');
    if (msgId) d.setAttribute('data-message-id', msgId);
    if (agent) {
        const h = document.createElement('div');
        h.className = 'message-header';
        h.textContent = agent;
        d.appendChild(h);
    }
    const c = document.createElement('div');
    c.className = 'message-content';
    c.innerHTML = text.replace(/\n/g, '<br>');
    d.appendChild(c);
    if (!isUser && agent !== 'Система') {
        const fb = document.createElement('div');
        fb.className = 'feedback-buttons';
        fb.innerHTML = `<button class="feedback-btn useful" data-rating="useful">👍 Полезно</button><button class="feedback-btn not-useful" data-rating="not_useful">👎 Не полезно</button>`;
        d.appendChild(fb);
    }
    area.appendChild(d);
    area.scrollTop = area.scrollHeight;
    return d;
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const query = input.value.trim();
    if (!query) return;
    addMessageToDOM(query, true, 'msg_' + Date.now());
    input.value = '';
    try {
        const r = await fetch('/ask', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, interface:'user'}) });
        const d = await r.json();
        if (d.success) {
            const msgId = 'msg_' + Date.now();
            addMessageToDOM(d.result, false, msgId, d.agent || 'ZORA');
            if (currentChatId) {
                await saveMessageToServer(currentChatId, 'user_' + Date.now(), 'user', query);
                await saveMessageToServer(currentChatId, msgId, 'assistant', d.result, d.agent);
            }
        } else {
            addMessageToDOM('Ошибка: ' + (d.error || 'Неизвестная ошибка'), false, null, 'Система');
        }
    } catch(e) {
        addMessageToDOM('Ошибка соединения: ' + e.message, false, null, 'Система');
    }
}

async function searchHistory() {
    const q = document.getElementById('searchInput').value.trim();
    const rd = document.getElementById('searchResults');
    if (!q) { rd.style.display = 'none'; return; }
    try {
        const r = await fetch('/api/search', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, limit:10}) });
        const d = await r.json();
        rd.style.display = 'block';
        rd.innerHTML = '';
        if (d.success && d.results.length > 0) {
            for (const res of d.results) {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.textContent = (res.text || '').substring(0, 120) + '...';
                rd.appendChild(div);
            }
        } else {
            rd.innerHTML = '<div style="padding:8px;color:#8b949e;">Ничего не найдено</div>';
        }
    } catch(e) {
        rd.style.display = 'block';
        rd.innerHTML = '<div style="padding:8px;color:#da3633;">Ошибка поиска</div>';
    }
}

function exportChat() {
    const msgs = [];
    document.querySelectorAll('#messagesArea .message').forEach(m => {
        const isUser = m.classList.contains('user-message');
        const text = m.querySelector('.message-content')?.innerText || '';
        if (text) msgs.push({ role: isUser ? 'user' : 'assistant', content: text });
    });
    const blob = new Blob([JSON.stringify(msgs, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'zora_chat_' + new Date().toISOString().slice(0,19) + '.json';
    a.click();
    URL.revokeObjectURL(url);
}

// ======================================================================
// 6. ТЕМА
// ======================================================================
function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('zora_user_theme', currentTheme);
    applyTheme(currentTheme);
}

function applyTheme(theme) {
    const btn = document.getElementById('themeToggleBtn');
    if (theme === 'light') {
        document.querySelectorAll('.left-card, .search-panel, .chats-list-panel, .chat-messages, .map-container').forEach(el => {
            el.style.background = '#ffffff'; el.style.borderColor = '#d0d7de';
        });
        document.querySelectorAll('.left-card-header, .search-header, .chat-header').forEach(el => {
            el.style.background = '#f6f8fa'; el.style.borderColor = '#d0d7de';
        });
        document.querySelectorAll('.list-item').forEach(el => { el.style.background = '#f0f2f5'; });
        document.querySelectorAll('.chat-textarea, .search-input').forEach(el => {
            el.style.background = '#ffffff'; el.style.borderColor = '#d0d7de'; el.style.color = '#1e293b';
        });
        document.querySelectorAll('.assistant-message').forEach(el => {
            el.style.background = '#e8ecf0'; el.style.color = '#1e293b';
        });
        document.querySelectorAll('.district-stats').forEach(el => { el.style.background = '#f6f8fa'; });
        document.body.style.background = '#f0f2f5';
        document.body.style.color = '#1e293b';
        if (btn) btn.textContent = '☀️';
    } else {
        document.querySelectorAll('.left-card, .search-panel, .chats-list-panel, .chat-messages, .map-container').forEach(el => {
            el.style.background = '#151b23'; el.style.borderColor = '#2d333b';
        });
        document.querySelectorAll('.left-card-header, .search-header, .chat-header').forEach(el => {
            el.style.background = '#0d1117'; el.style.borderColor = '#2d333b';
        });
        document.querySelectorAll('.list-item').forEach(el => { el.style.background = '#21262d'; });
        document.querySelectorAll('.chat-textarea, .search-input').forEach(el => {
            el.style.background = '#0d1117'; el.style.borderColor = '#2d333b'; el.style.color = '#e6edf3';
        });
        document.querySelectorAll('.assistant-message').forEach(el => {
            el.style.background = '#2d333b'; el.style.color = '#e6edf3';
        });
        document.querySelectorAll('.district-stats').forEach(el => { el.style.background = '#0d1117'; });
        document.body.style.background = '#0a0c10';
        document.body.style.color = '#e6edf3';
        if (btn) btn.textContent = '🌙';
    }
}

// ======================================================================
// 7. ИНИЦИАЛИЗАЦИЯ
// ======================================================================
document.addEventListener('DOMContentLoaded', function() {
    initMap();
    renderClients();
    renderReps();
    renderZones();
    loadChats().then(() => restoreCurrentChat());
    applyTheme(currentTheme);

    document.getElementById('chatInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    document.getElementById('messagesArea').addEventListener('click', async function(e) {
        const t = e.target;
        if (t.classList.contains('feedback-btn')) {
            const rating = t.getAttribute('data-rating') || 'useful';
            try {
                await fetch('/api/feedback', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message_id:'', rating, assistant_response:''}) });
                t.parentElement.innerHTML = rating === 'useful' ? '👍 (оценено)' : '👎 (оценено)';
            } catch(e) { console.error(e); }
        }
    });
});
