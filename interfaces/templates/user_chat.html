<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORA – Помощник компании</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: #1e293b;
            --header-bg: #0f172a;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --user-msg-bg: #3b82f6;
            --assistant-msg-bg: #334155;
            --input-bg: #0f172a;
            --input-border: #334155;
            --button-bg: #3b82f6;
            --button-hover: #2563eb;
            --hover-bg: #334155;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .chat-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            border: 1px solid var(--border-color);
        }

        .chat-header {
            background: var(--header-bg);
            color: var(--text-primary);
            padding: 16px 24px;
            text-align: center;
            font-size: 1.4em;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2em;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .agent-select {
            padding: 12px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.9em;
        }

        select, button.clear-btn, button.export-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        select:hover, button.clear-btn:hover, button.export-btn:hover {
            background: var(--hover-bg);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            clear: both;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: var(--user-msg-bg);
            color: white;
            align-self: flex-end;
            border-radius: 20px 20px 4px 20px;
            padding: 12px 18px;
        }

        .assistant-message {
            background: var(--assistant-msg-bg);
            color: var(--text-primary);
            align-self: flex-start;
            border-radius: 20px 20px 20px 4px;
            padding: 12px 18px;
            border: 1px solid var(--border-color);
        }

        .message-header {
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content {
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-content pre {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85em;
            margin: 8px 0;
        }

        .feedback-buttons {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            font-size: 0.8em;
        }

        .feedback-buttons button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1em;
            padding: 2px 6px;
            border-radius: 12px;
            transition: background 0.2s;
            color: var(--text-secondary);
        }

        .feedback-buttons button:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .comment-box {
            margin-top: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        .comment-box textarea {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
            font-size: 0.85em;
        }

        .comment-box button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            width: fit-content;
            font-size: 0.8em;
        }

        .chat-input-area {
            display: flex;
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--card-bg);
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--input-border);
            border-radius: 28px;
            font-size: 1em;
            outline: none;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--button-bg);
        }

        button.send-btn {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 28px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        button.send-btn:hover {
            background: var(--button-hover);
        }

        .typing {
            font-style: italic;
            color: var(--text-secondary);
            padding: 8px 20px;
            font-size: 0.85em;
        }

        .status-badge {
            font-size: 0.7em;
            background: rgba(59, 130, 246, 0.2);
            padding: 4px 8px;
            border-radius: 12px;
            color: #60a5fa;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .message { max-width: 95%; }
            .agent-select { flex-direction: column; align-items: stretch; }
            .chat-header { flex-direction: column; text-align: left; }
        }

        /* Стили для скроллбара */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: var(--input-bg);
            border-radius: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span>🤖 ZORA – интеллектуальный помощник</span>
        <div class="header-controls">
            <a href="/modern" target="_blank" class="icon-btn" title="Перейти в интерфейс разработчика">🛠️</a>
            <button class="icon-btn" id="themeToggle" title="Переключить тему">🌙</button>
            <button class="icon-btn" id="exportChatBtn" title="Экспорт чата">📎</button>
        </div>
    </div>
    <div class="agent-select">
        <label>Выберите специалиста (опционально):</label>
        <select id="agentSelect">
            <option value="auto">Автоматически</option>
            <option value="economist">Экономист</option>
            <option value="accountant">Бухгалтер</option>
            <option value="logistician">Логист</option>
            <option value="purchaser">Закупщик</option>
            <option value="sales_manager">Коммерческий директор</option>
            <option value="support">Поддержка</option>
        </select>
        <button class="clear-btn" id="clearChatBtn">Очистить чат</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="typing" id="typingIndicator" style="display: none;">ZORA печатает...</div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="userInput" placeholder="Введите ваш вопрос..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Отправить</button>
    </div>
</div>

<script>
    // DOM элементы
    const messagesDiv = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const agentSelect = document.getElementById('agentSelect');
    const typingIndicator = document.getElementById('typingIndicator');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const exportChatBtn = document.getElementById('exportChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const sendBtn = document.getElementById('sendBtn');

    // Состояние
    let currentTheme = localStorage.getItem('zora_theme') || 'dark';
    let chatHistory = [];

    // Генерация ID
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    // Сохранение чата в localStorage
    function saveChatHistory() {
        const messages = [];
        document.querySelectorAll('.message').forEach(msg => {
            const isUser = msg.classList.contains('user-message');
            const text = msg.querySelector('.message-content')?.innerText || '';
            const agent = msg.getAttribute('data-agent') || '';
            const messageId = msg.getAttribute('data-message-id') || '';
            if (text) {
                messages.push({
                    id: messageId,
                    text,
                    isUser,
                    agent,
                    timestamp: msg.getAttribute('data-timestamp') || Date.now()
                });
            }
        });
        localStorage.setItem('zora_chat_history', JSON.stringify(messages));
    }

    // Загрузка истории чата
    function loadChatHistory() {
        const saved = localStorage.getItem('zora_chat_history');
        if (saved) {
            try {
                const messages = JSON.parse(saved);
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    addMessageToDOM(msg.text, msg.isUser, msg.agent, msg.id);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch(e) { console.error(e); }
        } else {
            // Приветственное сообщение
            addMessageToDOM("Здравствуйте! Я ZORA — ваш интеллектуальный помощник. Задайте вопрос, и я направлю его нужному специалисту.", false, "Система", generateId());
        }
    }

    // Добавление сообщения в DOM (без отправки на сервер)
    function addMessageToDOM(text, isUser = false, agent = '', messageId = null, timestamp = null) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
        const msgId = messageId || generateId();
        messageDiv.setAttribute('data-message-id', msgId);
        messageDiv.setAttribute('data-timestamp', timestamp || Date.now());
        if (!isUser && agent) {
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = agent;
            messageDiv.appendChild(header);
            messageDiv.setAttribute('data-agent', agent);
        }
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        // Простое форматирование: поддержка переносов строк и базовых ссылок
        let formattedText = text.replace(/\n/g, '<br>');
        // Преобразование ссылок
        formattedText = formattedText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: #60a5fa;">$1</a>');
        contentDiv.innerHTML = formattedText;
        messageDiv.appendChild(contentDiv);
        
        if (!isUser && agent !== 'Система') {
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback-buttons';
            feedbackDiv.innerHTML = `
                <button class="thumbs-up" data-id="${msgId}">👍 Полезно</button>
                <button class="thumbs-down" data-id="${msgId}">👎 Не полезно</button>
            `;
            messageDiv.appendChild(feedbackDiv);
            
            const commentBox = document.createElement('div');
            commentBox.className = 'comment-box';
            commentBox.id = `comment-${msgId}`;
            commentBox.innerHTML = `
                <textarea rows="2" placeholder="Что было не так? (необязательно)"></textarea>
                <button data-id="${msgId}">Отправить жалобу</button>
            `;
            messageDiv.appendChild(commentBox);
        }
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        saveChatHistory();
        return messageDiv;
    }

    // Отправка сообщения
    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;
        
        // Добавляем сообщение пользователя
        addMessageToDOM(query, true);
        userInput.value = '';
        typingIndicator.style.display = 'block';
        
        const agent = agentSelect.value === 'auto' ? null : agentSelect.value;
        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    query, 
                    agent,
                    interface: "user"
                })
            });
            const data = await response.json();
            typingIndicator.style.display = 'none';
            if (data.success) {
                const assistantMsg = addMessageToDOM(data.result, false, data.agent, generateId());
                assistantMsg.setAttribute('data-query', query);
                assistantMsg.setAttribute('data-agent', data.agent);
            } else {
                addMessageToDOM(`Ошибка: ${data.error || 'Неизвестная ошибка'}`, false, "Система");
            }
        } catch (error) {
            typingIndicator.style.display = 'none';
            addMessageToDOM(`Ошибка соединения: ${error.message}`, false, "Система");
        }
    }

    // Очистка чата
    function clearChat() {
        if (confirm('Очистить всю историю чата?')) {
            messagesDiv.innerHTML = '';
            localStorage.removeItem('zora_chat_history');
            addMessageToDOM("Чат очищен. Задайте новый вопрос.", false, "Система", generateId());
        }
    }

    // Экспорт чата в JSON
    function exportChat() {
        const messages = [];
        document.querySelectorAll('.message').forEach(msg => {
            const isUser = msg.classList.contains('user-message');
            const text = msg.querySelector('.message-content')?.innerText || '';
            const agent = msg.getAttribute('data-agent') || '';
            const timestamp = msg.getAttribute('data-timestamp') || '';
            if (text) {
                messages.push({
                    role: isUser ? 'user' : 'assistant',
                    agent: agent,
                    content: text,
                    timestamp: new Date(parseInt(timestamp)).toLocaleString()
                });
            }
        });
        const dataStr = JSON.stringify(messages, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `zora_chat_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // Переключение темы
    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('zora_theme', currentTheme);
        applyTheme(currentTheme);
    }

    function applyTheme(theme) {
        const root = document.documentElement;
        if (theme === 'dark') {
            root.style.setProperty('--bg-gradient-start', '#0f172a');
            root.style.setProperty('--bg-gradient-end', '#1e293b');
            root.style.setProperty('--card-bg', '#1e293b');
            root.style.setProperty('--header-bg', '#0f172a');
            root.style.setProperty('--border-color', '#334155');
            root.style.setProperty('--text-primary', '#f1f5f9');
            root.style.setProperty('--text-secondary', '#94a3b8');
            root.style.setProperty('--user-msg-bg', '#3b82f6');
            root.style.setProperty('--assistant-msg-bg', '#334155');
            root.style.setProperty('--input-bg', '#0f172a');
            root.style.setProperty('--input-border', '#334155');
            root.style.setProperty('--button-bg', '#3b82f6');
            root.style.setProperty('--button-hover', '#2563eb');
            root.style.setProperty('--hover-bg', '#334155');
            themeToggle.textContent = '🌙';
        } else {
            root.style.setProperty('--bg-gradient-start', '#e0e7ff');
            root.style.setProperty('--bg-gradient-end', '#f1f5f9');
            root.style.setProperty('--card-bg', '#ffffff');
            root.style.setProperty('--header-bg', '#f8fafc');
            root.style.setProperty('--border-color', '#cbd5e1');
            root.style.setProperty('--text-primary', '#1e293b');
            root.style.setProperty('--text-secondary', '#475569');
            root.style.setProperty('--user-msg-bg', '#2563eb');
            root.style.setProperty('--assistant-msg-bg', '#e2e8f0');
            root.style.setProperty('--input-bg', '#ffffff');
            root.style.setProperty('--input-border', '#cbd5e1');
            root.style.setProperty('--button-bg', '#2563eb');
            root.style.setProperty('--button-hover', '#1d4ed8');
            root.style.setProperty('--hover-bg', '#e2e8f0');
            themeToggle.textContent = '☀️';
        }
    }

    // Обработка feedback (делегирование)
    messagesDiv.addEventListener('click', async (e) => {
        const target = e.target;
        if (target.classList.contains('thumbs-up')) {
            const msgDiv = target.closest('.message');
            const msgId = msgDiv.getAttribute('data-message-id');
            const query = msgDiv.getAttribute('data-query') || '';
            const assistantResponse = msgDiv.querySelector('.message-content')?.innerText || '';
            await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message_id: msgId,
                    query: query,
                    assistant_response: assistantResponse,
                    rating: 'useful',
                    comment: ''
                })
            });
            alert('Спасибо за оценку!');
            target.parentElement.innerHTML = '👍 (оценено)';
        }
        else if (target.classList.contains('thumbs-down')) {
            const msgDiv = target.closest('.message');
            const msgId = msgDiv.getAttribute('data-message-id');
            const commentBox = document.getElementById(`comment-${msgId}`);
            if (commentBox.style.display === 'flex') {
                commentBox.style.display = 'none';
            } else {
                commentBox.style.display = 'flex';
            }
        }
        else if (target.tagName === 'BUTTON' && target.parentElement.classList.contains('comment-box')) {
            const commentBox = target.parentElement;
            const msgDiv = commentBox.closest('.message');
            const msgId = msgDiv.getAttribute('data-message-id');
            const query = msgDiv.getAttribute('data-query') || '';
            const assistantResponse = msgDiv.querySelector('.message-content')?.innerText || '';
            const comment = commentBox.querySelector('textarea').value;
            await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message_id: msgId,
                    query: query,
                    assistant_response: assistantResponse,
                    rating: 'not_useful',
                    comment: comment
                })
            });
            alert('Жалоба отправлена. Спасибо, это поможет улучшить ассистента!');
            commentBox.style.display = 'none';
            const feedbackDiv = msgDiv.querySelector('.feedback-buttons');
            if (feedbackDiv) feedbackDiv.innerHTML = '👎 (жалоба отправлена)';
        }
    });

    // Обработчики событий
    sendBtn.addEventListener('click', sendMessage);
    clearChatBtn.addEventListener('click', clearChat);
    exportChatBtn.addEventListener('click', exportChat);
    themeToggle.addEventListener('click', toggleTheme);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Применяем тему при загрузке
    applyTheme(currentTheme);
    // Загружаем историю
    loadChatHistory();
</script>
</body>
</html>
