    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ZORA Assistant — Ria IDE (CodeMirror)</title>
        <!-- CodeMirror CSS и тема -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css">
        <!-- Подсветка для разных языков -->
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/sql/sql.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/json/json.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Segoe UI', 'Fira Code', 'Cascadia Code', monospace;
                background: #0a0c10;
                color: #e6edf3;
                height: 100vh;
                overflow: hidden;
            }
            .app {
                display: flex;
                height: 100vh;
                padding: 8px;
                gap: 8px;
            }
            .left-panel {
                width: 300px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .file-tree {
                flex: 1;
                background: #151b23;
                border-radius: 12px;
                border: 1px solid #2d333b;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .file-tree-header {
                padding: 12px 16px;
                background: #0d1117;
                border-bottom: 1px solid #2d333b;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-weight: 600;
                font-size: 13px;
            }
            .tree-actions button {
                background: #21262d;
                border: none;
                color: #c9d1d9;
                font-size: 14px;
                margin-left: 8px;
                padding: 4px 8px;
                border-radius: 6px;
                cursor: pointer;
            }
            .file-tree-content {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
            }
            .file-item {
                padding: 6px 10px;
                border-radius: 6px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                transition: background 0.1s;
            }
            .file-item:hover { background: #21262d; }
            .file-item.active { background: #1f6feb; color: white; }
            .folder-icon::before { content: "📁 "; font-size: 14px; }
            .file-icon::before { content: "📄 "; font-size: 14px; }
            .reasoning-panel {
                background: #151b23;
                border-radius: 12px;
                border: 1px solid #2d333b;
                display: flex;
                flex-direction: column;
                height: 220px;
            }
            .reasoning-header {
                padding: 10px 16px;
                background: #0d1117;
                border-bottom: 1px solid #2d333b;
                display: flex;
                justify-content: space-between;
                align-items: center;
                cursor: pointer;
                font-weight: 600;
                font-size: 12px;
            }
            .reasoning-content {
                flex: 1;
                overflow-y: auto;
                padding: 12px;
                font-size: 12px;
                line-height: 1.5;
                color: #b1bac4;
            }
            .reasoning-step {
                border-left: 2px solid #2f81f7;
                padding-left: 12px;
                margin-bottom: 10px;
            }
            .center-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .editor-container {
                flex: 1;
                background: #0d1117;
                border-radius: 12px;
                border: 1px solid #2d333b;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .editor-header {
                padding: 8px 16px;
                background: #0d1117;
                border-bottom: 1px solid #2d333b;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .editor-tabs {
                display: flex;
                gap: 4px;
            }
            .editor-tab {
                padding: 4px 12px;
                background: #21262d;
                border-radius: 6px 6px 0 0;
                font-size: 12px;
                cursor: pointer;
            }
            .editor-tab.active {
                background: #1f6feb;
                color: white;
            }
            .editor-actions button {
                background: #21262d;
                border: none;
                color: #c9d1d9;
                padding: 4px 12px;
                border-radius: 6px;
                font-size: 12px;
                margin-left: 8px;
                cursor: pointer;
            }
            .editor-actions button.primary {
                background: #2f81f7;
                color: white;
            }
            .editor-actions button.danger {
                background: #da3633;
                color: white;
            }
            .CodeMirror {
                height: 100%;
                font-size: 13px;
                font-family: 'Fira Code', 'Cascadia Code', monospace;
                background: #0d1117;
            }
            .terminal-panel {
                background: #0d1117;
                border-radius: 12px;
                border: 1px solid #2d333b;
                display: flex;
                flex-direction: column;
                height: 180px;
            }
            .terminal-header {
                padding: 8px 16px;
                background: #0d1117;
                border-bottom: 1px solid #2d333b;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 12px;
                font-weight: 600;
            }
            .terminal-content {
                flex: 1;
                overflow-y: auto;
                padding: 10px;
                font-family: monospace;
                font-size: 12px;
                white-space: pre-wrap;
            }
            .terminal-input-line {
                padding: 8px 16px;
                border-top: 1px solid #2d333b;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .terminal-prompt {
                color: #3fb950;
                font-weight: bold;
            }
            .terminal-input {
                flex: 1;
                background: transparent;
                border: none;
                color: #e6edf3;
                font-family: monospace;
                outline: none;
            }
            .right-panel {
                width: 360px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .chats-list-panel {
                background: #151b23;
                border-radius: 12px;
                border: 1px solid #2d333b;
                padding: 12px;
            }
            .chats-header {
                display: flex;
                justify-content: space-between;
                margin-bottom: 12px;
                font-weight: 600;
                font-size: 13px;
            }
            .chats-actions button {
                background: #21262d;
                border: none;
                color: #c9d1d9;
                padding: 4px 8px;
                border-radius: 6px;
                font-size: 12px;
                margin-left: 6px;
                cursor: pointer;
            }
            .chats-list {
                max-height: 180px;
                overflow-y: auto;
            }
            .chat-item {
                padding: 8px 12px;
                background: #21262d;
                border-radius: 8px;
                margin-bottom: 6px;
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .chat-item.active {
                background: #1f6feb;
                color: white;
            }
            .chat-messages {
                flex: 1;
                background: #151b23;
                border-radius: 12px;
                border: 1px solid #2d333b;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .chat-header {
                padding: 12px;
                border-bottom: 1px solid #2d333b;
                font-weight: 600;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 8px;
            }
            .chat-title {
                font-weight: 600;
                font-size: 13px;
            }
            .status-bar {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .status-icon {
                font-size: 14px;
                cursor: help;
                width: 20px;
                text-align: center;
            }
            .export-icon {
                background: none;
                border: none;
                color: #c9d1d9;
                font-size: 16px;
                cursor: pointer;
                padding: 0 4px;
            }
            .export-icon:hover {
                color: #2f81f7;
            }
            .connection-dot {
                color: #3fb950;
                font-size: 12px;
                margin-left: 4px;
            }
            .vram-indicator {
                font-size: 10px;
                font-family: monospace;
                background: #21262d;
                padding: 2px 6px;
                border-radius: 10px;
                cursor: help;
            }
            .messages-area {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .message {
                padding: 6px 10px;
                border-radius: 10px;
                max-width: 85%;
                width: fit-content;
                font-size: 12px;
                line-height: 1.4;
                word-wrap: break-word;
                word-break: break-word;
                white-space: normal;
            }
            .user-message {
                background: #1f6feb;
                color: white;
                align-self: flex-end;
                margin-left: auto;
            }
            .assistant-message {
                background: #2d333b;
                color: #e6edf3;
                align-self: flex-start;
                margin-right: auto;
            }
            .message-content {
                font-size: 12px;
                white-space: pre-wrap;
                word-wrap: break-word;
            }
            .message-header {
                font-size: 10px;
                color: #8b949e;
                margin-bottom: 4px;
            }
            .system-message {
                background: #0d1117;
                color: #8b949e;
                font-size: 12px;
                text-align: center;
            }
            .chat-input-area {
                padding: 12px;
                border-top: 1px solid #2d333b;
            }
            .chat-textarea {
                width: 100%;
                background: #0d1117;
                border: 1px solid #2d333b;
                border-radius: 8px;
                padding: 10px;
                color: #e6edf3;
                resize: none;
                font-family: inherit;
            }
            .chat-send {
                margin-top: 8px;
                width: 100%;
                background: #2f81f7;
                border: none;
                padding: 8px;
                border-radius: 8px;
                color: white;
                cursor: pointer;
            }
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                align-items: center;
                justify-content: center;
                z-index: 1000;
            }
            .modal-content {
                background: #151b23;
                border-radius: 16px;
                border: 1px solid #2d333b;
                width: 480px;
                max-width: 90%;
                padding: 20px;
            }
            .modal-header {
                display: flex;
                justify-content: space-between;
                margin-bottom: 16px;
            }
            .modal-body {
                margin-bottom: 20px;
            }
            .modal-body input[type="text"], .modal-body input[type="file"] {
                width: 100%;
                padding: 8px;
                background: #0d1117;
                border: 1px solid #2d333b;
                border-radius: 6px;
                color: #e6edf3;
                margin-bottom: 12px;
            }
            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
            }
            .checkbox-group label {
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
            }
            .checkbox-group span {
                font-size: 13px;
                color: #b1bac4;
            }
            .modal-footer {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
            }
            button {
                background: #21262d;
                border: none;
                padding: 6px 12px;
                border-radius: 6px;
                color: white;
                cursor: pointer;
            }
            button.primary {
                background: #2f81f7;
            }
            button.danger {
                background: #da3633;
            }
            .feedback-buttons {
                margin-top: 8px;
                display: flex;
                gap: 8px;
                font-size: 0.8em;
                opacity: 0.7;
                transition: opacity 0.2s;
            }
            .assistant-message:hover .feedback-buttons {
                opacity: 1;
            }
            .feedback-buttons button {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1em;
                padding: 2px 6px;
                border-radius: 12px;
                transition: background 0.2s;
                color: #e6edf3;
            }
            .feedback-buttons button:hover {
                background: #444c56;
            }
            .comment-box {
                margin-top: 8px;
                display: none;
                flex-direction: column;
                gap: 6px;
            }
            .comment-box textarea {
                width: 100%;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #444c56;
                background: #0d1117;
                color: #e6edf3;
                resize: vertical;
                font-family: inherit;
                font-size: 0.9em;
            }
            .comment-box button {
                background: #1e6fbb;
                color: white;
                border: none;
                padding: 6px 12px;
                border-radius: 20px;
                cursor: pointer;
                width: fit-content;
                font-size: 0.9em;
            }
            .feedback-sent {
                font-size: 0.8em;
                color: #8b949e;
                margin-top: 8px;
                font-style: italic;
            }
            .confirmation-buttons {
                display: flex;
                gap: 12px;
                margin-top: 12px;
                padding-top: 8px;
                border-top: 1px solid #2d333b;
            }
            .confirm-btn {
                background: #2f81f7;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                transition: background 0.2s;
            }
            .confirm-btn:hover {
                background: #1a6bbf;
            }
            .reject-btn {
                background: #da3633;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                transition: background 0.2s;
            }
            .reject-btn:hover {
                background: #b52a27;
            }
            .confirmation-buttons button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            /* Поиск */
            .search-panel {
                background: #151b23;
                border-radius: 12px;
                border: 1px solid #2d333b;
                margin-bottom: 8px;
                overflow: hidden;
            }
            .search-header {
                padding: 8px 12px;
                background: #0d1117;
                border-bottom: 1px solid #2d333b;
                font-size: 12px;
                font-weight: 600;
            }
            .search-input-area {
                display: flex;
                padding: 8px;
                gap: 8px;
            }
            .search-input {
                flex: 1;
                background: #0d1117;
                border: 1px solid #2d333b;
                border-radius: 6px;
                padding: 6px 10px;
                color: #e6edf3;
                outline: none;
            }
            .search-btn {
                background: #2f81f7;
                border: none;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                color: white;
            }
            .search-results {
                max-height: 200px;
                overflow-y: auto;
                padding: 8px;
                border-top: 1px solid #2d333b;
            }
            .search-result-item {
                padding: 8px;
                border-radius: 6px;
                cursor: pointer;
                margin-bottom: 4px;
                background: #21262d;
            }
            .search-result-item:hover {
                background: #1f6feb;
            }
        </style>
    </head>
    <body>
    <div class="app">
        <div class="left-panel">
            <div class="file-tree">
                <div class="file-tree-header">
                    <span>📁 ПРОЕКТ</span>
                    <div class="tree-actions">
                        <button onclick="refreshFileTree()">⟳</button>
                        <button onclick="showUploadModal()">⬆️</button>
                        <button onclick="showTrainModal()">🧠</button>
                    </div>
                </div>
                <div class="file-tree-content" id="fileTree">Загрузка...</div>
            </div>
            <div class="reasoning-panel">
                <div class="reasoning-header" onclick="toggleReasoning()">
                    <span>🧠 РАССУЖДЕНИЯ</span>
                    <span id="reasoningToggle">▲</span>
                </div>
                <div class="reasoning-content" id="reasoningContent">
                    <div class="reasoning-step">Здесь будут мысли ассистента...</div>
                </div>
            </div>
        </div>

        <div class="center-panel">
            <div class="editor-container">
                <div class="editor-header">
                    <div class="editor-tabs">
                        <div class="editor-tab active" data-path="">untitled</div>
                    </div>
                    <div class="editor-actions">
                        <button onclick="saveCurrentFile()">💾 Сохранить</button>
                        <button class="danger" onclick="deleteCurrentFile()">🗑 Удалить</button>
                        <button class="primary" onclick="runCode()">▶ Выполнить</button>
                    </div>
                </div>
                <textarea id="code-editor" spellcheck="false"></textarea>
            </div>
            <div class="terminal-panel" id="terminalPanel">
                <div class="terminal-header">
                    <span>💻 ТЕРМИНАЛ</span>
                    <button onclick="toggleTerminal()" id="terminalToggleBtn">Скрыть</button>
                </div>
                <div class="terminal-content" id="terminalContent">
                    $ Добро пожаловать в терминал ZORA<br>
                </div>
                <div class="terminal-input-line">
                    <span class="terminal-prompt">$</span>
                    <input type="text" class="terminal-input" id="terminalInput" placeholder="Введите команду..." onkeydown="handleTerminalKey(event)">
                </div>
            </div>
        </div>

        <div class="right-panel">
            <!-- Панель поиска по истории -->
            <div class="search-panel">
                <div class="search-header">
                    <span>🔍 ПОИСК В ИСТОРИИ</span>
                </div>
                <div class="search-input-area">
                    <input type="text" id="searchInput" placeholder="Поиск по диалогам..." class="search-input">
                    <button onclick="searchHistory()" class="search-btn">🔍</button>
                </div>
                <div class="search-results" id="searchResults" style="display: none;"></div>
            </div>
            <div class="chats-list-panel">
                <div class="chats-header">
                    <span>💬 ЧАТЫ</span>
                    <div class="chats-actions">
                        <button onclick="createNewChat()">+ Новый</button>
                        <button onclick="deleteCurrentChat()">🗑 Удалить</button>
                    </div>
                </div>
                <div class="chats-list" id="chatsList"></div>
            </div>
            <div class="chat-messages">
                <div class="chat-header">
                    <div class="chat-title">💬 ЧАТ С RIA</div>
                    <div class="status-bar">
                        <span id="ollama-status" class="status-icon" title="Ollama">🟢</span>
                        <span id="qdrant-status" class="status-icon" title="Qdrant">🟢</span>
                        <span id="postgres-status" class="status-icon" title="PostgreSQL">🟢</span>
                        <span id="deepseek-status" class="status-icon" title="DeepSeek">🟢</span>
                        <span id="vram-indicator" class="vram-indicator" title="VRAM usage">💾 0%</span>
                        <button onclick="exportChat()" class="export-icon" title="Экспорт диалога">📄</button>
                        <span id="connection-status" class="connection-dot" title="Подключено">●</span>
                    </div>
                </div>
                <!-- 3.3 Прогресс-бар выполнения -->
                <div id="execution-progress" style="display: none; height: 2px; background: #2f81f7; width: 0%; transition: width 0.3s;"></div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="chat-input-area">
                    <div style="display: flex; gap: 8px; align-items: stretch;">
                        <textarea class="chat-textarea" id="chatInput" rows="2" placeholder="Спросите Ria... (Enter для отправки)" style="flex: 1;"></textarea>
                        <!-- 3.2 Кнопка "Объясни" — уменьшенная до знака вопроса -->
                        <button class="explain-btn" onclick="askExplain()" title="Объясни, что ты делаешь">❓</button>
                    </div>
                    <button class="chat-send" onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>📤 Загрузка файлов</span>
                <button onclick="closeModal('uploadModal')">✖</button>
            </div>
            <div class="modal-body">
                <input type="file" id="uploadFiles" multiple>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="uploadRecursive"> <span>Рекурсивно (для папок)</span></label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="primary" onclick="uploadFiles()">Загрузить</button>
                <button onclick="closeModal('uploadModal')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="trainModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>🧠 Обучение (индексация)</span>
                <button onclick="closeModal('trainModal')">✖</button>
            </div>
            <div class="modal-body">
                <label>Путь для индексации:</label>
                <input type="text" id="trainPath" placeholder="Например: . или D:\ZORA">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="trainRecursive"> Рекурсивно</label>
                    <label><input type="checkbox" id="trainClean"> Очистить перед индексацией</label>
                </div>
                <div id="trainProgress" style="display:none; color:#2f81f7;">Индексация запущена в фоне...</div>
            </div>
            <div class="modal-footer">
                <button class="primary" onclick="startTraining()">Запустить</button>
                <button onclick="closeModal('trainModal')">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let editor = null;
        let currentFilePath = '';
        let currentChatId = 'default';
        let chats = {};
        let fileTree = [];

        // ========== Инициализация CodeMirror ==========
        function initEditor() {
            const textarea = document.getElementById('code-editor');
            editor = CodeMirror.fromTextArea(textarea, {
                lineNumbers: true,
                mode: 'python',
                theme: 'material-darker',
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                extraKeys: {
                    "Ctrl-S": function(cm) { saveCurrentFile(); },
                    "Cmd-S": function(cm) { saveCurrentFile(); }
                }
            });
            editor.setValue('// Откройте файл из дерева проектов');
            console.log('✅ CodeMirror готов');
        }

        function getLanguageFromExtension(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const map = {
                'py': 'python', 'js': 'javascript', 'jsx': 'javascript',
                'ts': 'javascript', 'tsx': 'javascript', 'html': 'htmlmixed',
                'htm': 'htmlmixed', 'css': 'css', 'json': 'json', 'md': 'markdown',
                'sql': 'sql', 'yaml': 'yaml', 'yml': 'yaml', 'txt': 'text/plain',
                'sh': 'shell', 'bash': 'shell'
            };
            return map[ext] || 'text/plain';
        }

        // ========== Загрузка чатов и сообщений с сервера ==========
        async function loadChats() {
            try {
                const response = await fetch('/api/chats');
                const data = await response.json();
                if (data.success) {
                    chats = {};
                    for (let chat of data.chats) {
                        chats[chat.chat_id] = {
                            id: chat.chat_id,
                            name: chat.name,
                            messages: []
                        };
                    }
                }
            } catch (e) {
                console.error('Ошибка загрузки чатов:', e);
            }
            if (!chats.default) {
                try {
                    await fetch('/api/chats', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: 'default', name: 'Основной чат' })
                    });
                } catch(e) {}
                chats.default = { id: 'default', name: 'Основной чат', messages: [] };
            }
            renderChatsList();
        }

        async function loadMessages(chatId) {
            try {
                const response = await fetch(`/api/chats/${chatId}/messages?limit=50`);
                const data = await response.json();
                if (data.success) {
                    if (!chats[chatId]) {
                        chats[chatId] = { id: chatId, name: 'Чат', messages: [] };
                    }
                    chats[chatId].messages = data.messages.map(msg => ({
                        text: msg.content,
                        isUser: msg.role === 'user',
                        id: msg.message_id,
                        agent: msg.agent
                    }));
                }
            } catch (e) {
                console.error('Ошибка загрузки сообщений:', e);
            }
        }

        async function restoreCurrentChat() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            await loadMessages(currentChatId);
            const messages = chats[currentChatId]?.messages || [];
            for (let msg of messages) {
                addMessageToDOM(msg.text, msg.isUser, msg.id, msg.agent);
            }
        }

        async function saveMessageToServer(chatId, messageId, role, content, agent = null) {
            try {
                await fetch(`/api/chats/${chatId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_id: messageId, role, content, agent })
                });
            } catch (e) {
                console.error('Ошибка сохранения сообщения:', e);
            }
        }

        function renderAssistantMessage(text, msgId, agent, pendingPlan) {
            const div = document.createElement('div');
            div.className = 'assistant-message';
            div.setAttribute('data-message-id', msgId);
            
            let plan = null;
            let isConfirmation = false;
            
            // Приоритет 1: pendingPlan передан напрямую
            if (pendingPlan) {
                plan = pendingPlan;
                isConfirmation = true;
            }
            
            // Fallback: ищем план в тексте сообщения
            if (!plan) {
                isConfirmation = text.includes('Требуется подтверждение') && text.includes('"plan"');
                if (isConfirmation) {
                    const planMatch = text.match(/"plan":\s*(\[[\s\S]*?\])/);
                    if (planMatch) {
                        try {
                            plan = JSON.parse(planMatch[1]);
                        } catch(e) {
                            console.error('Ошибка парсинга плана из текста:', e);
                        }
                    }
                }
            }
            
            let displayText = text;
            if (isConfirmation && plan) {
                displayText = text.replace(/```json[\s\S]*?```/, '```json\n[план действий]\n```');
            }
            
            if (agent) {
                const header = document.createElement('div');
                header.className = 'message-header';
                header.textContent = agent;
                div.appendChild(header);
            }
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = displayText.replace(/\n/g, '<br>');
            div.appendChild(contentDiv);
            
            if (isConfirmation && plan) {
                const buttonsDiv = document.createElement('div');
                buttonsDiv.className = 'confirmation-buttons';
                
                const confirmBtn = document.createElement('button');
                confirmBtn.textContent = '✅ Принять';
                confirmBtn.className = 'confirm-btn';
                
                const rejectBtn = document.createElement('button');
                rejectBtn.textContent = '❌ Отклонить';
                rejectBtn.className = 'reject-btn';
                
                confirmBtn.onclick = async () => {
                    confirmBtn.disabled = true;
                    rejectBtn.disabled = true;
                    confirmBtn.textContent = '⏳ Выполняется...';
                    
                    try {
                        const response = await fetch('/api/confirm', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ plan: plan, confirm: true })
                        });
                        const data = await response.json();
                        
                        if (data.success) {
                            const resultDiv = document.createElement('div');
                            resultDiv.className = 'assistant-message';
                            resultDiv.innerHTML = `<div class="message-content">✅ Выполнено:<br>${data.result.replace(/\n/g, '<br>')}</div>`;
                            div.replaceWith(resultDiv);
                        } else {
                            confirmBtn.textContent = '❌ Ошибка';
                            confirmBtn.style.background = '#da3633';
                            rejectBtn.remove();
                            const errorDiv = document.createElement('div');
                            errorDiv.className = 'system-message';
                            errorDiv.textContent = `Ошибка: ${data.error}`;
                            buttonsDiv.appendChild(errorDiv);
                        }
                    } catch (e) {
                        confirmBtn.textContent = '❌ Ошибка';
                        console.error(e);
                    }
                };
                
                rejectBtn.onclick = () => {
                    const rejectMsg = document.createElement('div');
                    rejectMsg.className = 'system-message';
                    rejectMsg.textContent = '❌ Действие отменено пользователем';
                    div.parentNode?.insertBefore(rejectMsg, div.nextSibling);
                    div.remove();
                };
                
                buttonsDiv.appendChild(confirmBtn);
                buttonsDiv.appendChild(rejectBtn);
                div.appendChild(buttonsDiv);
            } else {
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-buttons';
                feedbackDiv.innerHTML = `
                    <button class="feedback-btn useful" data-id="${msgId}" data-rating="useful">👍 Полезно</button>
                    <button class="feedback-btn not-useful" data-id="${msgId}" data-rating="not_useful">👎 Не полезно</button>
                    <button class="feedback-btn comment" data-id="${msgId}">💬 Комментарий</button>
                    <button class="feedback-btn copy-btn" data-id="${msgId}">📋 Копировать</button>
                `;
                div.appendChild(feedbackDiv);
                
                const commentBox = document.createElement('div');
                commentBox.className = 'comment-box';
                commentBox.id = `comment_${msgId}`;
                commentBox.style.display = 'none';
                commentBox.innerHTML = `
                    <textarea placeholder="Ваш комментарий (опционально)..." rows="2"></textarea>
                    <button class="send-comment" data-id="${msgId}">Отправить отзыв</button>
                `;
                div.appendChild(commentBox);
            }
            
            return div;
        }

        function addMessageToDOM(text, isUser, msgId, agent = '', pendingPlan = null) {
            const area = document.getElementById('messagesArea');
            let div;
            
            if (isUser) {
                div = document.createElement('div');
                div.className = 'user-message';
                div.setAttribute('data-message-id', msgId);
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = text.replace(/\n/g, '<br>');
                div.appendChild(contentDiv);
            } else {
                div = renderAssistantMessage(text, msgId, agent, pendingPlan);
            }
            
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function renderChatsList() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            Object.values(chats).forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.innerHTML = `<span>${chat.name}</span><span>💬</span>`;
                div.onclick = () => switchChat(chat.id);
                container.appendChild(div);
            });
        }

        async function switchChat(chatId) {
            if (!chats[chatId]) return;
            currentChatId = chatId;
            renderChatsList();
            await restoreCurrentChat();
        }

        async function createNewChat() {
            const name = prompt('Название чата:', 'Новый чат');
            if (!name) return;
            const id = 'chat_' + Date.now();
            try {
                const response = await fetch('/api/chats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: id, name: name })
                });
                const data = await response.json();
                if (data.success) {
                    chats[id] = { id, name, messages: [] };
                    renderChatsList();
                    await switchChat(id);
                } else {
                    addSystemMessage(`Ошибка создания чата: ${data.error}`);
                }
            } catch (e) {
                addSystemMessage(`Ошибка сети: ${e.message}`);
            }
        }

        async function deleteCurrentChat() {
            if (currentChatId === 'default') { addSystemMessage('Основной чат нельзя удалить'); return; }
            if (!confirm('Удалить чат?')) return;
            try {
                const response = await fetch(`/api/chats/${currentChatId}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.success) {
                    delete chats[currentChatId];
                    renderChatsList();
                    await switchChat('default');
                } else {
                    addSystemMessage(`Ошибка удаления: ${data.error}`);
                }
            } catch (e) {
                addSystemMessage(`Ошибка сети: ${e.message}`);
            }
        }

        // ========== 3.2 Кнопка "Объясни" ==========
        function askExplain() {
            const input = document.getElementById('chatInput');
            const currentText = input.value;
            input.value = 'объясни, ' + (currentText || 'что ты делаешь?');
            sendMessage();
        }

        async function sendMessage() {
            const progress = document.getElementById('execution-progress');
            if (progress) {
                progress.style.display = 'block';
                progress.style.width = '30%';
            }
            
            const input = document.getElementById('chatInput');
            const query = input.value.trim();
            if (!query) return;
            const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            addMessageToDOM(query, true, msgId);
            input.value = '';
            
            await saveMessageToServer(currentChatId, msgId, 'user', query);
            
            const history = [];
            const messageElements = document.querySelectorAll('#messagesArea .message:not(.system-message)');
            for (let i = Math.max(0, messageElements.length - 10); i < messageElements.length; i++) {
                const el = messageElements[i];
                const isUserMsg = el.classList.contains('user-message');
                const text = el.querySelector('.message-content')?.innerText || '';
                if (text) history.push({ role: isUserMsg ? 'user' : 'assistant', content: text });
            }
            
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query, 
                        agent: 'developer_assistant', 
                        interface: "dev",
                        history: history
                    })
                });
                const data = await res.json();
                console.log('sendMessage response:', data);
                if (data.mode === 'confirmation_required') {
                    console.log('План требует подтверждения:', data.pending_plan);
                }
                if (data.success) {
                    const assistantMsgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    
                    // Если требуется подтверждение — передаём pending_plan напрямую в renderAssistantMessage
                    let displayText = data.result;
                    let pendingPlan = null;
                    if (data.mode === 'confirmation_required' && data.pending_plan) {
                        pendingPlan = data.pending_plan;
                        console.log('pendingPlan установлен:', pendingPlan);
                    }
                    
                    addMessageToDOM(displayText, false, assistantMsgId, data.agent, pendingPlan);
                    await saveMessageToServer(currentChatId, assistantMsgId, 'assistant', displayText, data.agent);
                    
                    // Задача 1: Отображаем рассуждения
                    if (data.reasoning) {
                        updateReasoning(data.reasoning);
                    } else {
                        // fallback: извлекаем рассуждения из текста ответа
                        const reasoningMatch = data.result.match(/РАССУЖДЕНИЯ:([\s\S]*?)(?=\n\n|\n##|\n$)/);
                        if (reasoningMatch) {
                            updateReasoning(reasoningMatch[1].trim());
                        }
                    }
                    
                    // Задача 3: Открываем созданные файлы в редакторе
                    if (data.result.includes('write_file') || data.result.includes('✅ write_file')) {
                        const filePathMatch = data.result.match(/write_file[:\s]+([^\s\n]+)/i);
                        if (filePathMatch) {
                            const filePath = filePathMatch[1];
                            await openFileByPath(filePath);
                        }
                    }
                } else {
                    const errMsg = `Ошибка: ${data.error || 'Неизвестная ошибка'}`;
                    addMessageToDOM(errMsg, false, 'err_' + Date.now());
                    await saveMessageToServer(currentChatId, 'err_' + Date.now(), 'assistant', errMsg);
                }
            } catch (e) {
                const errMsg = `Ошибка соединения: ${e.message}`;
                addMessageToDOM(errMsg, false, 'err_' + Date.now());
                await saveMessageToServer(currentChatId, 'err_' + Date.now(), 'assistant', errMsg);
            }
            
            // 3.3 Прогресс-бар: завершаем
            if (progress) {
                progress.style.width = '100%';
                setTimeout(() => { progress.style.display = 'none'; progress.style.width = '0%'; }, 500);
            }
        }

        function updateReasoning(reasoning) {
            const container = document.getElementById('reasoningContent');
            if (typeof reasoning === 'string') {
                // Разбиваем на шаги по маркерам
                const steps = reasoning.split(/\n(?=\d+\.|\*|\-)/);
                container.innerHTML = steps.map(step => `<div class="reasoning-step">${step.trim()}</div>`).join('');
            } else if (Array.isArray(reasoning)) {
                container.innerHTML = reasoning.map(r => `<div class="reasoning-step">${r}</div>`).join('');
            } else {
                container.innerHTML = '<div class="reasoning-step">Ассистент обдумывает ответ...</div>';
            }
        }

        // Задача 3: Функция открытия файла по пути
        async function openFileByPath(path) {
            try {
                const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
                const data = await res.json();
                if (data.success) {
                    currentFilePath = path;
                    editor.setValue(data.content);
                    const ext = path.split('.').pop().toLowerCase();
                    const langMap = { 'py': 'python', 'js': 'javascript', 'html': 'htmlmixed', 'css': 'css', 'json': 'json', 'md': 'markdown' };
                    editor.setOption('mode', langMap[ext] || 'text/plain');
                    updateTab(path.split('/').pop());
                    addSystemMessage(`📁 Файл открыт: ${path}`);
                }
            } catch(e) {
                console.error('Ошибка открытия файла:', e);
            }
        }

        function addSystemMessage(text) {
            const area = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'system-message';
            div.innerText = text;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        // ========== Файловое дерево и редактор ==========
        async function refreshFileTree(path = '') {
            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
                const data = await res.json();
                if (data.success) {
                    fileTree = data.files;
                    renderFileTree(fileTree, path);
                } else {
                    addSystemMessage(`Ошибка загрузки: ${data.error}`);
                }
            } catch (e) {
                addSystemMessage(`Ошибка сети: ${e.message}`);
            }
        }

        function renderFileTree(files, currentPath) {
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            if (!files.length) {
                container.innerHTML = '<div class="file-item">Пусто</div>';
                return;
            }
            const sorted = [...files].sort((a,b) => {
                if (a.type === 'directory' && b.type !== 'directory') return -1;
                if (a.type !== 'directory' && b.type === 'directory') return 1;
                return a.name.localeCompare(b.name);
            });
            sorted.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<span class="${file.type === 'directory' ? 'folder-icon' : 'file-icon'}"></span><span>${file.name}</span>`;
                div.onclick = async () => {
                    if (file.type === 'directory') await refreshFileTree(file.path);
                    else openFile(file);
                };
                container.appendChild(div);
            });
            if (currentPath && currentPath !== '') {
                const backDiv = document.createElement('div');
                backDiv.className = 'file-item';
                backDiv.innerHTML = `<span>⬅️ Назад</span>`;
                backDiv.onclick = () => {
                    const parentPath = currentPath.split('/').slice(0, -1).join('/');
                    refreshFileTree(parentPath);
                };
                container.prepend(backDiv);
            }
        }

        async function openFile(file) {
            try {
                const res = await fetch(`/api/file?path=${encodeURIComponent(file.path)}`);
                const data = await res.json();
                if (data.success) {
                    currentFilePath = file.path;
                    editor.setValue(data.content);
                    const lang = getLanguageFromExtension(file.name);
                    editor.setOption('mode', lang);
                    updateTab(file.name);
                } else {
                    addSystemMessage(`Ошибка открытия: ${data.error}`);
                }
            } catch (e) { 
                addSystemMessage(`Ошибка: ${e.message}`); 
            }
        }

        function updateTab(name) {
            const tab = document.querySelector('.editor-tab.active');
            if (tab) tab.textContent = name;
        }

        async function saveCurrentFile() {
            if (!currentFilePath) { addSystemMessage('Нет открытого файла'); return; }
            try {
                const res = await fetch('/api/file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentFilePath, content: editor.getValue() })
                });
                const data = await res.json();
                if (data.success) addSystemMessage(`Файл сохранён: ${currentFilePath}`);
                else addSystemMessage(`Ошибка сохранения: ${data.error}`);
            } catch (e) { addSystemMessage(`Ошибка: ${e.message}`); }
        }

        async function deleteCurrentFile() {
            if (!currentFilePath) { addSystemMessage('Нет открытого файла'); return; }
            if (!confirm(`Удалить файл ${currentFilePath}?`)) return;
            try {
                const res = await fetch(`/api/file?path=${encodeURIComponent(currentFilePath)}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    addSystemMessage(`Файл удалён: ${currentFilePath}`);
                    currentFilePath = '';
                    editor.setValue('// Файл удалён');
                    editor.setOption('mode', 'text/plain');
                    updateTab('untitled');
                    await refreshFileTree();
                } else {
                    addSystemMessage(`Ошибка удаления: ${data.error || 'Неизвестная ошибка'}`);
                }
            } catch (e) {
                addSystemMessage(`Ошибка удаления: ${e.message}`);
            }
        }

        async function runCode() {
            const code = editor.getValue();
            const msgId = 'code_' + Date.now();
            addMessageToDOM(`Выполнение кода:\n\`\`\`\n${code}\n\`\`\``, true, msgId);
            await saveMessageToServer(currentChatId, msgId, 'user', `Выполнение кода:\n${code}`);
            try {
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: `python -c "${code.replace(/"/g, '\\"').replace(/\n/g, '; ')}"` })
                });
                const data = await res.json();
                const resMsgId = 'res_' + Date.now();
                if (data.success) {
                    addMessageToDOM(`Результат:\n${data.output}`, false, resMsgId);
                    await saveMessageToServer(currentChatId, resMsgId, 'assistant', `Результат:\n${data.output}`);
                } else {
                    addMessageToDOM(`Ошибка: ${data.error}`, false, resMsgId);
                    await saveMessageToServer(currentChatId, resMsgId, 'assistant', `Ошибка: ${data.error}`);
                }
            } catch (e) {
                const errMsgId = 'err_' + Date.now();
                addMessageToDOM(`Ошибка: ${e.message}`, false, errMsgId);
                await saveMessageToServer(currentChatId, errMsgId, 'assistant', `Ошибка: ${e.message}`);
            }
        }

        // ========== Терминал ==========
        function handleTerminalKey(e) { if (e.key === 'Enter') executeCommand(); }
        async function executeCommand() {
            const input = document.getElementById('terminalInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            addTerminalOutput(`$ ${cmd}`);
            input.value = '';
            try {
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await res.json();
                if (data.success) addTerminalOutput(data.output);
                else addTerminalOutput(`Ошибка: ${data.error}`);
            } catch (e) { addTerminalOutput(`Ошибка: ${e.message}`); }
        }
        function addTerminalOutput(text) {
            const cont = document.getElementById('terminalContent');
            cont.innerHTML += text + '<br>';
            cont.scrollTop = cont.scrollHeight;
        }
        function clearTerminal() { document.getElementById('terminalContent').innerHTML = '$ Терминал очищен<br>'; }
        function toggleTerminal() {
            const panel = document.getElementById('terminalPanel');
            const btn = document.getElementById('terminalToggleBtn');
            if (panel.style.display === 'none') {
                panel.style.display = 'flex';
                btn.textContent = 'Скрыть';
            } else {
                panel.style.display = 'none';
                btn.textContent = 'Показать';
            }
        }
        function toggleReasoning() {
            const content = document.getElementById('reasoningContent');
            const toggle = document.getElementById('reasoningToggle');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                toggle.textContent = '▲';
            } else {
                content.style.display = 'none';
                toggle.textContent = '▼';
            }
        }

        // ========== Модальные окна ==========
        function showUploadModal() { document.getElementById('uploadModal').style.display = 'flex'; }
        function showTrainModal() { document.getElementById('trainModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        async function uploadFiles() {
            const files = document.getElementById('uploadFiles').files;
            if (!files.length) { addSystemMessage('Выберите файлы'); return; }
            const recursive = document.getElementById('uploadRecursive').checked;
            for (let file of files) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('recursive', recursive);
                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) addSystemMessage(`Загружен: ${file.name}`);
                    else addSystemMessage(`Ошибка ${file.name}: ${data.error}`);
                } catch (e) { addSystemMessage(`Ошибка: ${e.message}`); }
            }
            closeModal('uploadModal');
            refreshFileTree();
        }
        async function startTraining() {
            const path = document.getElementById('trainPath').value;
            const recursive = document.getElementById('trainRecursive').checked;
            const clean = document.getElementById('trainClean').checked;
            const progress = document.getElementById('trainProgress');
            progress.style.display = 'block';
            try {
                const res = await fetch('/api/train', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, recursive, clean })
                });
                const data = await res.json();
                if (data.success) addSystemMessage(`Обучение запущено: ${data.message}`);
                else addSystemMessage(`Ошибка обучения: ${data.error}`);
            } catch (e) { addSystemMessage(`Ошибка: ${e.message}`); }
            progress.style.display = 'none';
            closeModal('trainModal');
        }

        // ========== Обработка обратной связи ==========
        document.getElementById('messagesArea').addEventListener('click', async (e) => {
            const target = e.target;
            const msgDiv = target.closest('.message');
            if (!msgDiv) return;
            
            if (target.classList.contains('confirm-btn')) {
                // Сначала проверяем data.pendingPlan из data-атрибутов
                let plan = null;
                const pendingPlanStr = msgDiv.dataset.pendingPlan;
                if (pendingPlanStr) {
                    try {
                        plan = JSON.parse(pendingPlanStr);
                    } catch(e) {
                        console.error('Ошибка парсинга pending_plan из data-атрибута:', e);
                    }
                }
                
                // Fallback: ищем план в тексте сообщения
                if (!plan) {
                    const msgContent = msgDiv.querySelector('.message-content')?.innerText || '';
                    const planMatch = msgContent.match(/"plan":\s*(\[[\s\S]*?\])\s*\n/);
                    if (planMatch) {
                        try {
                            plan = JSON.parse(planMatch[1]);
                        } catch (e) {
                            console.error('Ошибка парсинга плана из текста:', e);
                        }
                    } else {
                        const jsonMatch = msgContent.match(/```json\n([\s\S]*?)```/);
                        if (jsonMatch) {
                            try {
                                const parsed = JSON.parse(jsonMatch[1]);
                                plan = parsed.plan || [];
                            } catch (e) {
                                console.error('Ошибка парсинга JSON из текста:', e);
                            }
                        }
                    }
                }
                
                if (plan && plan.length > 0) {
                    try {
                        const res = await fetch('/api/confirm', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ plan, confirm: true })
                        });
                        const data = await res.json();
                        if (data.success) addSystemMessage(`✅ Выполнено:\n${data.result}`);
                        else addSystemMessage(`❌ Ошибка: ${data.error}`);
                    } catch (e) {
                        addSystemMessage(`❌ Ошибка выполнения: ${e.message}`);
                    }
                } else {
                    addSystemMessage('❌ Не удалось извлечь план из сообщения');
                }
                const actions = msgDiv.querySelector('.message-actions');
                if (actions) actions.style.display = 'none';
                return;
            }
            
            if (target.classList.contains('reject-btn')) {
                addSystemMessage('❌ Действие отменено пользователем');
                const actions = msgDiv.querySelector('.message-actions');
                if (actions) actions.style.display = 'none';
                return;
            }
            
            if (target.classList.contains('useful') || target.classList.contains('not-useful')) {
                const rating = target.classList.contains('useful') ? 'useful' : 'not_useful';
                const msgId = target.getAttribute('data-id');
                let userQuery = '';
                const prevMsg = msgDiv.previousElementSibling;
                if (prevMsg && prevMsg.classList.contains('user-message')) {
                    userQuery = prevMsg.querySelector('.message-content')?.innerText || prevMsg.innerText;
                }
                const assistantResponse = msgDiv.querySelector('.message-content')?.innerText || '';
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message_id: msgId,
                        query: userQuery,
                        assistant_response: assistantResponse,
                        rating: rating,
                        comment: ''
                    })
                });
                alert('Спасибо за оценку!');
                target.parentElement.innerHTML = rating === 'useful' ? '👍 (оценено)' : '👎 (оценено)';
            }
            else if (target.classList.contains('copy-btn')) {
                const msgContent = msgDiv.querySelector('.message-content')?.innerText || '';
                if (msgContent) {
                    navigator.clipboard.writeText(msgContent).then(() => {
                        target.textContent = '✅ Скопировано';
                        setTimeout(() => { target.textContent = '📋 Копировать'; }, 2000);
                    }).catch(() => {
                        // Fallback для старых браузеров
                        const textarea = document.createElement('textarea');
                        textarea.value = msgContent;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        target.textContent = '✅ Скопировано';
                        setTimeout(() => { target.textContent = '📋 Копировать'; }, 2000);
                    });
                }
            }
            else if (target.classList.contains('comment')) {
                const msgId = target.getAttribute('data-id');
                const commentBox = document.getElementById(`comment_${msgId}`);
                if (commentBox) commentBox.style.display = 'flex';
            }
            else if (target.classList.contains('send-comment')) {
                const msgId = target.getAttribute('data-id');
                const commentBox = document.getElementById(`comment_${msgId}`);
                const textarea = commentBox.querySelector('textarea');
                const comment = textarea.value.trim();
                let userQuery = '';
                const prevMsg = msgDiv.previousElementSibling;
                if (prevMsg && prevMsg.classList.contains('user-message')) {
                    userQuery = prevMsg.querySelector('.message-content')?.innerText || prevMsg.innerText;
                }
                const assistantResponse = msgDiv.querySelector('.message-content')?.innerText || '';
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message_id: msgId,
                        query: userQuery,
                        assistant_response: assistantResponse,
                        rating: 'not_useful',
                        comment: comment
                    })
                });
                alert('Спасибо за отзыв!');
                commentBox.style.display = 'none';
                textarea.value = '';
                const feedbackDiv = msgDiv.querySelector('.feedback-buttons');
                if (feedbackDiv) feedbackDiv.innerHTML = '👎 (жалоба отправлена)';
            }
        });

        // ========== Статус-бар (компактный) ==========
        async function updateStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                const ollamaEl = document.getElementById('ollama-status');
                ollamaEl.textContent = data.ollama_available ? '🟢' : '🔴';
                ollamaEl.title = data.ollama_available ? 'Ollama: работает' : 'Ollama: недоступен';
                
                const qdrantEl = document.getElementById('qdrant-status');
                qdrantEl.textContent = data.qdrant_available ? '🟢' : '🔴';
                qdrantEl.title = data.qdrant_available ? 'Qdrant: работает' : 'Qdrant: недоступен';
                
                const pgEl = document.getElementById('postgres-status');
                pgEl.textContent = data.postgres_available ? '🟢' : '🔴';
                pgEl.title = data.postgres_available ? 'PostgreSQL: работает' : 'PostgreSQL: недоступен';
                
                const dsEl = document.getElementById('deepseek-status');
                dsEl.textContent = data.deepseek_available ? '🟢' : '🔴';
                dsEl.title = data.deepseek_available ? 'DeepSeek: работает' : 'DeepSeek: недоступен';
                
            } catch(e) {
                console.error('Ошибка обновления статуса:', e);
            }
        }

        // ========== Поиск по истории ==========
        async function searchHistory() {
            const input = document.getElementById('searchInput');
            const query = input.value.trim();
            if (!query) return;
            
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="search-result-item">⏳ Поиск...</div>';
            resultsDiv.style.display = 'block';
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, limit: 10 })
                });
                const data = await response.json();
                
                if (data.success && data.results.length > 0) {
                    resultsDiv.innerHTML = '';
                    for (const result of data.results) {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `<div><strong>📄 ${(result.score * 100).toFixed(1)}% совпадение</strong></div>
                                        <div style="font-size: 12px; color: #b1bac4;">${result.text.substring(0, 150)}...</div>`;
                        div.onclick = () => {
                            const chatInput = document.getElementById('chatInput');
                            chatInput.value = result.text;
                            chatInput.focus();
                            resultsDiv.style.display = 'none';
                        };
                        resultsDiv.appendChild(div);
                    }
                } else {
                    resultsDiv.innerHTML = '<div class="search-result-item">❌ Ничего не найдено</div>';
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="search-result-item">❌ Ошибка: ${e.message}</div>`;
            }
        }

        // ========== Экспорт диалога ==========
        async function exportChat() {
            const messages = [];
            document.querySelectorAll('#messagesArea .message:not(.system-message)').forEach(el => {
                const isUser = el.classList.contains('user-message');
                const text = el.querySelector('.message-content')?.innerText || '';
                if (text) {
                    messages.push({
                        role: isUser ? 'Пользователь' : 'Ria',
                        content: text,
                        timestamp: new Date().toISOString()
                    });
                }
            });
            
            if (messages.length === 0) {
                alert('Нет сообщений для экспорта');
                return;
            }
            
            let markdown = `# Диалог с Ria\n\n**Дата:** ${new Date().toLocaleString()}\n\n---\n\n`;
            for (const msg of messages) {
                markdown += `### ${msg.role}\n\n${msg.content}\n\n---\n\n`;
            }
            
            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dialog_${new Date().toISOString().slice(0, 19)}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ========== Горячие клавиши ==========
        document.addEventListener('keydown', (e) => {
            // Ctrl + K — очистить чат
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                if (confirm('Очистить текущий чат?')) {
                    document.getElementById('messagesArea').innerHTML = '';
                    addSystemMessage('💬 Чат очищен');
                }
            }
            // Ctrl + L — очистить терминал
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                clearTerminal();
            }
            // Ctrl + / — фокус на поиск
            if (e.ctrlKey && e.key === '/') {
                e.preventDefault();
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.focus();
            }
        });

        // Задача 6: Индикатор нагрузки VRAM/RAM
        async function updateVramStatus() {
            try {
                const response = await fetch('/api/system/stats');
                const data = await response.json();
                const indicator = document.getElementById('vram-indicator');
                if (indicator) {
                    const vramPercent = data.vram_percent || 0;
                    indicator.textContent = `💾 ${Math.round(vramPercent)}%`;
                    indicator.title = `VRAM: ${data.vram_used || 0} / ${data.vram_total || 0} MB | RAM: ${data.ram_percent || 0}%`;
                    if (vramPercent > 80) {
                        indicator.style.background = '#da3633';
                    } else if (vramPercent > 60) {
                        indicator.style.background = '#e3b341';
                    } else {
                        indicator.style.background = '#21262d';
                    }
                }
            } catch(e) {
                console.error('Ошибка получения статистики:', e);
            }
        }

        // ========== Инициализация ==========
        window.onload = async () => {
            initEditor();
            await loadChats();
            await restoreCurrentChat();
            refreshFileTree();
            updateStatus();
            updateVramStatus();
            setInterval(updateStatus, 30000);
            setInterval(updateVramStatus, 5000);
            document.getElementById('chatInput').focus();
            
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        };
        
        window.searchHistory = searchHistory;
        window.exportChat = exportChat;
        window.updateStatus = updateStatus;

        window.refreshFileTree = refreshFileTree;
        window.saveCurrentFile = saveCurrentFile;
        window.deleteCurrentFile = deleteCurrentFile;
        window.runCode = runCode;
        window.sendMessage = sendMessage;
        window.createNewChat = createNewChat;
        window.deleteCurrentChat = deleteCurrentChat;
        window.toggleTerminal = toggleTerminal;
        window.handleTerminalKey = handleTerminalKey;
        window.toggleReasoning = toggleReasoning;
        window.showUploadModal = showUploadModal;
        window.showTrainModal = showTrainModal;
        window.closeModal = closeModal;
        window.uploadFiles = uploadFiles;
        window.startTraining = startTraining;
        window.clearTerminal = clearTerminal;
    </script>
    </body>
    </html>
