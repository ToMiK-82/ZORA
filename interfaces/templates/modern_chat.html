<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORA Assistant — Ria IDE (CodeMirror)</title>
    <!-- CodeMirror CSS и тема -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css">
    <!-- Подсветка для разных языков -->
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/sql/sql.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/json/json.js"></script>
    <style>
        /* Все стили как ранее, но с адаптацией под CodeMirror */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Fira Code', 'Cascadia Code', monospace;
            background: #0a0c10;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            padding: 8px;
            gap: 8px;
        }
        .left-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-tree {
            flex: 1;
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .file-tree-header {
            padding: 12px 16px;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 13px;
        }
        .tree-actions button {
            background: #21262d;
            border: none;
            color: #c9d1d9;
            font-size: 14px;
            margin-left: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
        }
        .file-tree-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .file-item {
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: background 0.1s;
        }
        .file-item:hover { background: #21262d; }
        .file-item.active { background: #1f6feb; color: white; }
        .folder-icon::before { content: "📁 "; font-size: 14px; }
        .file-icon::before { content: "📄 "; font-size: 14px; }
        .reasoning-panel {
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            height: 220px;
        }
        .reasoning-header {
            padding: 10px 16px;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .reasoning-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
            color: #b1bac4;
        }
        .reasoning-step {
            border-left: 2px solid #2f81f7;
            padding-left: 12px;
            margin-bottom: 10px;
        }
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .editor-container {
            flex: 1;
            background: #0d1117;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .editor-header {
            padding: 8px 16px;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .editor-tabs {
            display: flex;
            gap: 4px;
        }
        .editor-tab {
            padding: 4px 12px;
            background: #21262d;
            border-radius: 6px 6px 0 0;
            font-size: 12px;
            cursor: pointer;
        }
        .editor-tab.active {
            background: #1f6feb;
            color: white;
        }
        .editor-actions button {
            background: #21262d;
            border: none;
            color: #c9d1d9;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-left: 8px;
            cursor: pointer;
        }
        .editor-actions button.primary {
            background: #2f81f7;
            color: white;
        }
        .editor-actions button.danger {
            background: #da3633;
            color: white;
        }
        /* CodeMirror на всю высоту */
        .CodeMirror {
            height: 100%;
            font-size: 13px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            background: #0d1117;
        }
        .terminal-panel {
            background: #0d1117;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            height: 180px;
        }
        .terminal-header {
            padding: 8px 16px;
            background: #0d1117;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
        }
        .terminal-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .terminal-input-line {
            padding: 8px 16px;
            border-top: 1px solid #2d333b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .terminal-prompt {
            color: #3fb950;
            font-weight: bold;
        }
        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e6edf3;
            font-family: monospace;
            outline: none;
        }
        .right-panel {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chats-list-panel {
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            padding: 12px;
        }
        .chats-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 13px;
        }
        .chats-actions button {
            background: #21262d;
            border: none;
            color: #c9d1d9;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-left: 6px;
            cursor: pointer;
        }
        .chats-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .chat-item {
            padding: 8px 12px;
            background: #21262d;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-item.active {
            background: #1f6feb;
            color: white;
        }
        .chat-messages {
            flex: 1;
            background: #151b23;
            border-radius: 12px;
            border: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px;
            border-bottom: 1px solid #2d333b;
            font-weight: 600;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 13px;
        }
        .user-message {
            background: #1f6feb;
            color: white;
            align-self: flex-end;
        }
        .assistant-message {
            background: #2d333b;
            color: #e6edf3;
            align-self: flex-start;
        }
        .system-message {
            background: #0d1117;
            color: #8b949e;
            font-size: 12px;
            text-align: center;
        }
        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #2d333b;
        }
        .chat-textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #2d333b;
            border-radius: 8px;
            padding: 10px;
            color: #e6edf3;
            resize: none;
            font-family: inherit;
        }
        .chat-send {
            margin-top: 8px;
            width: 100%;
            background: #2f81f7;
            border: none;
            padding: 8px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #151b23;
            border-radius: 16px;
            border: 1px solid #2d333b;
            width: 480px;
            max-width: 90%;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .modal-body {
            margin-bottom: 20px;
        }
        .modal-body input[type="text"], .modal-body input[type="file"] {
            width: 100%;
            padding: 8px;
            background: #0d1117;
            border: 1px solid #2d333b;
            border-radius: 6px;
            color: #e6edf3;
            margin-bottom: 12px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-group span {
            font-size: 13px;
            color: #b1bac4;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        button {
            background: #21262d;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        button.primary {
            background: #2f81f7;
        }
        button.danger {
            background: #da3633;
        }
        .feedback-buttons {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            font-size: 0.8em;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .assistant-message:hover .feedback-buttons {
            opacity: 1;
        }
        .feedback-buttons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            padding: 2px 6px;
            border-radius: 12px;
            transition: background 0.2s;
            color: #e6edf3;
        }
        .feedback-buttons button:hover {
            background: #444c56;
        }
        .comment-box {
            margin-top: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .comment-box textarea {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444c56;
            background: #0d1117;
            color: #e6edf3;
            resize: vertical;
            font-family: inherit;
            font-size: 0.9em;
        }
        .comment-box button {
            background: #1e6fbb;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            width: fit-content;
            font-size: 0.9em;
        }
        .feedback-sent {
            font-size: 0.8em;
            color: #8b949e;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="left-panel">
        <div class="file-tree">
            <div class="file-tree-header">
                <span>📁 ПРОЕКТ</span>
                <div class="tree-actions">
                    <button onclick="refreshFileTree()">⟳</button>
                    <button onclick="showUploadModal()">⬆️</button>
                    <button onclick="showTrainModal()">🧠</button>
                </div>
            </div>
            <div class="file-tree-content" id="fileTree">Загрузка...</div>
        </div>
        <div class="reasoning-panel">
            <div class="reasoning-header" onclick="toggleReasoning()">
                <span>🧠 РАССУЖДЕНИЯ</span>
                <span id="reasoningToggle">▲</span>
            </div>
            <div class="reasoning-content" id="reasoningContent">
                <div class="reasoning-step">Здесь будут мысли ассистента...</div>
            </div>
        </div>
    </div>

    <div class="center-panel">
        <div class="editor-container">
            <div class="editor-header">
                <div class="editor-tabs">
                    <div class="editor-tab active" data-path="">untitled</div>
                </div>
                <div class="editor-actions">
                    <button onclick="saveCurrentFile()">💾 Сохранить</button>
                    <button class="danger" onclick="deleteCurrentFile()">🗑 Удалить</button>
                    <button class="primary" onclick="runCode()">▶ Выполнить</button>
                </div>
            </div>
            <!-- Контейнер для CodeMirror -->
            <textarea id="code-editor" spellcheck="false"></textarea>
        </div>
        <div class="terminal-panel" id="terminalPanel">
            <div class="terminal-header">
                <span>💻 ТЕРМИНАЛ</span>
                <button onclick="toggleTerminal()" id="terminalToggleBtn">Скрыть</button>
            </div>
            <div class="terminal-content" id="terminalContent">
                $ Добро пожаловать в терминал ZORA<br>
            </div>
            <div class="terminal-input-line">
                <span class="terminal-prompt">$</span>
                <input type="text" class="terminal-input" id="terminalInput" placeholder="Введите команду..." onkeydown="handleTerminalKey(event)">
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="chats-list-panel">
            <div class="chats-header">
                <span>💬 ЧАТЫ</span>
                <div class="chats-actions">
                    <button onclick="createNewChat()">+ Новый</button>
                    <button onclick="deleteCurrentChat()">🗑 Удалить</button>
                </div>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        <div class="chat-messages">
            <div class="chat-header">
                <span>💬 ЧАТ С RIA</span>
                <span id="connection-status" style="font-size: 12px; color: #3fb950;">● Подключено</span>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="chat-input-area">
                <textarea class="chat-textarea" id="chatInput" rows="2" placeholder="Спросите Ria... (Enter для отправки)"></textarea>
                <button class="chat-send" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>📤 Загрузка файлов</span>
            <button onclick="closeModal('uploadModal')">✖</button>
        </div>
        <div class="modal-body">
            <input type="file" id="uploadFiles" multiple>
            <div class="checkbox-group">
                <label><input type="checkbox" id="uploadRecursive"> <span>Рекурсивно (для папок)</span></label>
            </div>
        </div>
        <div class="modal-footer">
            <button class="primary" onclick="uploadFiles()">Загрузить</button>
            <button onclick="closeModal('uploadModal')">Отмена</button>
        </div>
    </div>
</div>

<div id="trainModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>🧠 Обучение (индексация)</span>
            <button onclick="closeModal('trainModal')">✖</button>
        </div>
        <div class="modal-body">
            <label>Путь для индексации:</label>
            <input type="text" id="trainPath" placeholder="Например: . или D:\ZORA">
            <div class="checkbox-group">
                <label><input type="checkbox" id="trainRecursive"> Рекурсивно</label>
                <label><input type="checkbox" id="trainClean"> Очистить перед индексацией</label>
            </div>
            <div id="trainProgress" style="display:none; color:#2f81f7;">Индексация запущена в фоне...</div>
        </div>
        <div class="modal-footer">
            <button class="primary" onclick="startTraining()">Запустить</button>
            <button onclick="closeModal('trainModal')">Отмена</button>
        </div>
    </div>
</div>

<script>
    let editor = null;          // экземпляр CodeMirror
    let currentFilePath = '';
    let currentChatId = 'default';
    let chats = {};
    let fileTree = [];

    // ========== Инициализация CodeMirror ==========
    function initEditor() {
        const textarea = document.getElementById('code-editor');
        editor = CodeMirror.fromTextArea(textarea, {
            lineNumbers: true,
            mode: 'python',        // по умолчанию Python, потом будем менять
            theme: 'material-darker',
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: true,
            autoCloseBrackets: true,
            matchBrackets: true,
            extraKeys: {
                "Ctrl-S": function(cm) { saveCurrentFile(); },
                "Cmd-S": function(cm) { saveCurrentFile(); }
            }
        });
        editor.setValue('// Откройте файл из дерева проектов');
        console.log('✅ CodeMirror готов');
    }

    // Определение языка по расширению файла
    function getLanguageFromExtension(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const map = {
            'py': 'python',
            'js': 'javascript',
            'jsx': 'javascript',
            'ts': 'javascript',
            'tsx': 'javascript',
            'html': 'htmlmixed',
            'htm': 'htmlmixed',
            'css': 'css',
            'json': 'json',
            'md': 'markdown',
            'sql': 'sql',
            'yaml': 'yaml',
            'yml': 'yaml',
            'txt': 'text/plain',
            'sh': 'shell',
            'bash': 'shell'
        };
        return map[ext] || 'text/plain';
    }

    // ========== Сохранение и загрузка состояния ==========
    function saveAllState() {
        localStorage.setItem('zora_chats', JSON.stringify(chats));
        localStorage.setItem('zora_current_chat', currentChatId);
        const messagesArea = document.getElementById('messagesArea');
        if (messagesArea) localStorage.setItem('zora_scroll_top', messagesArea.scrollTop);
        const reasoning = document.getElementById('reasoningContent');
        if (reasoning) localStorage.setItem('zora_reasoning_html', reasoning.innerHTML);
    }

    function loadAllState() {
        const savedChats = localStorage.getItem('zora_chats');
        if (savedChats) {
            try { chats = JSON.parse(savedChats); } catch(e) { console.error(e); }
        }
        if (!chats.default) chats.default = { id: 'default', name: 'Основной чат', messages: [] };
        currentChatId = localStorage.getItem('zora_current_chat') || 'default';
        if (!chats[currentChatId]) currentChatId = 'default';
        renderChatsList();
        const savedReasoning = localStorage.getItem('zora_reasoning_html');
        if (savedReasoning) document.getElementById('reasoningContent').innerHTML = savedReasoning;
        const savedScroll = localStorage.getItem('zora_scroll_top');
        if (savedScroll) {
            setTimeout(() => {
                const area = document.getElementById('messagesArea');
                if (area) area.scrollTop = parseInt(savedScroll, 10);
            }, 100);
        }
        restoreCurrentChat();
    }

    function restoreCurrentChat() {
        const area = document.getElementById('messagesArea');
        area.innerHTML = '';
        const messages = chats[currentChatId]?.messages || [];
        for (let msg of messages) {
            addMessageToDOM(msg.text, msg.isUser, msg.id, msg.agent);
        }
        saveAllState();
    }

    function addMessageToDOM(text, isUser, msgId, agent = '') {
        const area = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
        div.setAttribute('data-message-id', msgId);
        if (!isUser && agent) {
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = agent;
            div.appendChild(header);
        }
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = text.replace(/\n/g, '<br>');
        div.appendChild(contentDiv);
        
        if (!isUser) {
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback-buttons';
            feedbackDiv.innerHTML = `
                <button class="feedback-btn useful" data-id="${msgId}" data-rating="useful">👍 Полезно</button>
                <button class="feedback-btn not-useful" data-id="${msgId}" data-rating="not_useful">👎 Не полезно</button>
                <button class="feedback-btn comment" data-id="${msgId}">💬 Комментарий</button>
            `;
            div.appendChild(feedbackDiv);
            const commentBox = document.createElement('div');
            commentBox.className = 'comment-box';
            commentBox.id = `comment_${msgId}`;
            commentBox.style.display = 'none';
            commentBox.innerHTML = `
                <textarea placeholder="Ваш комментарий (опционально)..." rows="2"></textarea>
                <button class="send-comment" data-id="${msgId}">Отправить отзыв</button>
            `;
            div.appendChild(commentBox);
        }
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function saveChats() {
        const messages = [];
        document.querySelectorAll('#messagesArea .message:not(.system-message)').forEach(el => {
            const isUser = el.classList.contains('user-message');
            const text = el.querySelector('.message-content')?.innerText || '';
            const id = el.getAttribute('data-message-id') || '';
            const agent = el.querySelector('.message-header')?.textContent || '';
            if (text) messages.push({ text, isUser, id, agent });
        });
        chats[currentChatId].messages = messages;
        saveAllState();
    }

    function renderChatsList() {
        const container = document.getElementById('chatsList');
        container.innerHTML = '';
        Object.values(chats).forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.innerHTML = `<span>${chat.name}</span><span>💬</span>`;
            div.onclick = () => switchChat(chat.id);
            container.appendChild(div);
        });
    }

    function switchChat(chatId) {
        if (!chats[chatId]) return;
        saveChats();
        currentChatId = chatId;
        renderChatsList();
        restoreCurrentChat();
        saveAllState();
    }

    function createNewChat() {
        const name = prompt('Название чата:', 'Новый чат');
        if (!name) return;
        const id = 'chat_' + Date.now();
        chats[id] = { id, name, messages: [] };
        renderChatsList();
        switchChat(id);
    }

    function deleteCurrentChat() {
        if (currentChatId === 'default') { addSystemMessage('Основной чат нельзя удалить'); return; }
        if (confirm('Удалить чат?')) {
            delete chats[currentChatId];
            renderChatsList();
            switchChat('default');
        }
    }

    // ========== Отправка сообщения с историей ==========
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const query = input.value.trim();
        if (!query) return;
        const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        addMessageToDOM(query, true, msgId);
        input.value = '';
        
        const history = [];
        const messageElements = document.querySelectorAll('#messagesArea .message:not(.system-message)');
        for (let i = Math.max(0, messageElements.length - 10); i < messageElements.length; i++) {
            const el = messageElements[i];
            const isUser = el.classList.contains('user-message');
            const text = el.querySelector('.message-content')?.innerText || '';
            if (text) history.push({ role: isUser ? 'user' : 'assistant', content: text });
        }
        
        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    query, 
                    agent: 'developer_assistant', 
                    interface: "dev",
                    history: history
                })
            });
            const data = await res.json();
            if (data.success) {
                const assistantMsgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                addMessageToDOM(data.result, false, assistantMsgId, data.agent);
                if (data.reasoning) updateReasoning(data.reasoning);
            } else {
                addMessageToDOM(`Ошибка: ${data.error || 'Неизвестная ошибка'}`, false, 'err_' + Date.now());
            }
        } catch (e) {
            addMessageToDOM(`Ошибка соединения: ${e.message}`, false, 'err_' + Date.now());
        }
        saveChats();
    }

    function updateReasoning(reasoning) {
        const container = document.getElementById('reasoningContent');
        if (typeof reasoning === 'string') container.innerHTML = `<div class="reasoning-step">${reasoning}</div>`;
        else if (Array.isArray(reasoning)) container.innerHTML = reasoning.map(r => `<div class="reasoning-step">${r}</div>`).join('');
        saveAllState();
    }

    function addSystemMessage(text) {
        const area = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.className = 'system-message';
        div.innerText = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
        saveChats();
    }

    // ========== Файловое дерево и редактор ==========
    async function refreshFileTree(path = '') {
        try {
            const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
            const data = await res.json();
            if (data.success) {
                fileTree = data.files;
                renderFileTree(fileTree, path);
            } else {
                addSystemMessage(`Ошибка загрузки: ${data.error}`);
            }
        } catch (e) {
            addSystemMessage(`Ошибка сети: ${e.message}`);
        }
    }

    function renderFileTree(files, currentPath) {
        const container = document.getElementById('fileTree');
        container.innerHTML = '';
        if (!files.length) {
            container.innerHTML = '<div class="file-item">Пусто</div>';
            return;
        }
        const sorted = [...files].sort((a,b) => {
            if (a.type === 'directory' && b.type !== 'directory') return -1;
            if (a.type !== 'directory' && b.type === 'directory') return 1;
            return a.name.localeCompare(b.name);
        });
        sorted.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span class="${file.type === 'directory' ? 'folder-icon' : 'file-icon'}"></span><span>${file.name}</span>`;
            div.onclick = async () => {
                if (file.type === 'directory') await refreshFileTree(file.path);
                else openFile(file);
            };
            container.appendChild(div);
        });
        if (currentPath && currentPath !== '') {
            const backDiv = document.createElement('div');
            backDiv.className = 'file-item';
            backDiv.innerHTML = `<span>⬅️ Назад</span>`;
            backDiv.onclick = () => {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                refreshFileTree(parentPath);
            };
            container.prepend(backDiv);
        }
    }

    async function openFile(file) {
        try {
            const res = await fetch(`/api/file?path=${encodeURIComponent(file.path)}`);
            const data = await res.json();
            if (data.success) {
                currentFilePath = file.path;
                editor.setValue(data.content);
                // Устанавливаем подсветку по расширению
                const lang = getLanguageFromExtension(file.name);
                editor.setOption('mode', lang);
                updateTab(file.name);
            } else {
                addSystemMessage(`Ошибка открытия: ${data.error}`);
            }
        } catch (e) { 
            addSystemMessage(`Ошибка: ${e.message}`); 
        }
    }

    function updateTab(name) {
        const tab = document.querySelector('.editor-tab.active');
        if (tab) tab.textContent = name;
    }

    async function saveCurrentFile() {
        if (!currentFilePath) { addSystemMessage('Нет открытого файла'); return; }
        try {
            const res = await fetch('/api/file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: currentFilePath, content: editor.getValue() })
            });
            const data = await res.json();
            if (data.success) addSystemMessage(`Файл сохранён: ${currentFilePath}`);
            else addSystemMessage(`Ошибка сохранения: ${data.error}`);
        } catch (e) { addSystemMessage(`Ошибка: ${e.message}`); }
    }

    async function deleteCurrentFile() {
        if (!currentFilePath) { addSystemMessage('Нет открытого файла'); return; }
        if (!confirm(`Удалить файл ${currentFilePath}?`)) return;
        try {
            const res = await fetch(`/api/file?path=${encodeURIComponent(currentFilePath)}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.success) {
                addSystemMessage(`Файл удалён: ${currentFilePath}`);
                currentFilePath = '';
                editor.setValue('// Файл удалён');
                editor.setOption('mode', 'text/plain');
                updateTab('untitled');
                await refreshFileTree();
            } else {
                addSystemMessage(`Ошибка удаления: ${data.error || 'Неизвестная ошибка'}`);
            }
        } catch (e) {
            addSystemMessage(`Ошибка удаления: ${e.message}`);
        }
    }

    async function runCode() {
        const code = editor.getValue();
        addMessageToDOM(`Выполнение кода:\n\`\`\`\n${code}\n\`\`\``, true, 'code_' + Date.now());
        try {
            const res = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: `python -c "${code.replace(/"/g, '\\"').replace(/\n/g, '; ')}"` })
            });
            const data = await res.json();
            if (data.success) addMessageToDOM(`Результат:\n${data.output}`, false, 'res_' + Date.now());
            else addMessageToDOM(`Ошибка: ${data.error}`, false, 'err_' + Date.now());
        } catch (e) {
            addMessageToDOM(`Ошибка: ${e.message}`, false, 'err_' + Date.now());
        }
        saveChats();
    }

    // ========== Терминал ==========
    function handleTerminalKey(e) { if (e.key === 'Enter') executeCommand(); }
    async function executeCommand() {
        const input = document.getElementById('terminalInput');
        const cmd = input.value.trim();
        if (!cmd) return;
        addTerminalOutput(`$ ${cmd}`);
        input.value = '';
        try {
            const res = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            });
            const data = await res.json();
            if (data.success) addTerminalOutput(data.output);
            else addTerminalOutput(`Ошибка: ${data.error}`);
        } catch (e) { addTerminalOutput(`Ошибка: ${e.message}`); }
    }
    function addTerminalOutput(text) {
        const cont = document.getElementById('terminalContent');
        cont.innerHTML += text + '<br>';
        cont.scrollTop = cont.scrollHeight;
    }
    function clearTerminal() { document.getElementById('terminalContent').innerHTML = '$ Терминал очищен<br>'; }
    function toggleTerminal() {
        const panel = document.getElementById('terminalPanel');
        const btn = document.getElementById('terminalToggleBtn');
        if (panel.style.display === 'none') {
            panel.style.display = 'flex';
            btn.textContent = 'Скрыть';
        } else {
            panel.style.display = 'none';
            btn.textContent = 'Показать';
        }
    }
    function toggleReasoning() {
        const content = document.getElementById('reasoningContent');
        const toggle = document.getElementById('reasoningToggle');
        if (content.style.display === 'none') {
            content.style.display = 'block';
            toggle.textContent = '▲';
        } else {
            content.style.display = 'none';
            toggle.textContent = '▼';
        }
    }

    // ========== Модальные окна ==========
    function showUploadModal() { document.getElementById('uploadModal').style.display = 'flex'; }
    function showTrainModal() { document.getElementById('trainModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    async function uploadFiles() {
        const files = document.getElementById('uploadFiles').files;
        if (!files.length) { addSystemMessage('Выберите файлы'); return; }
        const recursive = document.getElementById('uploadRecursive').checked;
        for (let file of files) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('recursive', recursive);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) addSystemMessage(`Загружен: ${file.name}`);
                else addSystemMessage(`Ошибка ${file.name}: ${data.error}`);
            } catch (e) { addSystemMessage(`Ошибка: ${e.message}`); }
        }
        closeModal('uploadModal');
        refreshFileTree();
    }
    async function startTraining() {
        const path = document.getElementById('trainPath').value;
        const recursive = document.getElementById('trainRecursive').checked;
        const clean = document.getElementById('trainClean').checked;
        const progress = document.getElementById('trainProgress');
        progress.style.display = 'block';
        try {
            const res = await fetch('/api/train', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path, recursive, clean })
            });
            const data = await res.json();
            if (data.success) addSystemMessage(`Обучение запущено: ${data.message}`);
            else addSystemMessage(`Ошибка обучения: ${data.error}`);
        } catch (e) { addSystemMessage(`Ошибка: ${e.message}`); }
        progress.style.display = 'none';
        closeModal('trainModal');
    }

    // ========== Обработка обратной связи ==========
    document.getElementById('messagesArea').addEventListener('click', async (e) => {
        const target = e.target;
        const msgDiv = target.closest('.message');
        if (!msgDiv) return;
        
        if (target.classList.contains('useful') || target.classList.contains('not-useful')) {
            const rating = target.classList.contains('useful') ? 'useful' : 'not_useful';
            const msgId = target.getAttribute('data-id');
            let userQuery = '';
            const prevMsg = msgDiv.previousElementSibling;
            if (prevMsg && prevMsg.classList.contains('user-message')) {
                userQuery = prevMsg.querySelector('.message-content')?.innerText || prevMsg.innerText;
            }
            const assistantResponse = msgDiv.querySelector('.message-content')?.innerText || '';
            await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message_id: msgId,
                    query: userQuery,
                    assistant_response: assistantResponse,
                    rating: rating,
                    comment: ''
                })
            });
            alert('Спасибо за оценку!');
            target.parentElement.innerHTML = rating === 'useful' ? '👍 (оценено)' : '👎 (оценено)';
        }
        else if (target.classList.contains('comment')) {
            const msgId = target.getAttribute('data-id');
            const commentBox = document.getElementById(`comment_${msgId}`);
            if (commentBox) commentBox.style.display = 'flex';
        }
        else if (target.classList.contains('send-comment')) {
            const msgId = target.getAttribute('data-id');
            const commentBox = document.getElementById(`comment_${msgId}`);
            const textarea = commentBox.querySelector('textarea');
            const comment = textarea.value.trim();
            let userQuery = '';
            const prevMsg = msgDiv.previousElementSibling;
            if (prevMsg && prevMsg.classList.contains('user-message')) {
                userQuery = prevMsg.querySelector('.message-content')?.innerText || prevMsg.innerText;
            }
            const assistantResponse = msgDiv.querySelector('.message-content')?.innerText || '';
            await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message_id: msgId,
                    query: userQuery,
                    assistant_response: assistantResponse,
                    rating: 'not_useful',
                    comment: comment
                })
            });
            alert('Спасибо за отзыв!');
            commentBox.style.display = 'none';
            textarea.value = '';
            const feedbackDiv = msgDiv.querySelector('.feedback-buttons');
            if (feedbackDiv) feedbackDiv.innerHTML = '👎 (жалоба отправлена)';
        }
    });

    // ========== Инициализация страницы ==========
    window.onload = () => {
        initEditor();
        loadAllState();
        refreshFileTree();
        setInterval(() => fetch('/status').catch(e=>{}), 30000);
        document.getElementById('chatInput').focus();
        
        // Добавляем обработчик Enter для отправки сообщений
        const chatInput = document.getElementById('chatInput');
        if (chatInput) {
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
                // Shift+Enter для новой строки
                if (e.key === 'Enter' && e.shiftKey) {
                    // Разрешаем стандартное поведение (новая строка)
                }
            });
        }
    };

    // Глобальные функции
    window.refreshFileTree = refreshFileTree;
    window.saveCurrentFile = saveCurrentFile;
    window.deleteCurrentFile = deleteCurrentFile;
    window.runCode = runCode;
    window.sendMessage = sendMessage;
    window.createNewChat = createNewChat;
    window.deleteCurrentChat = deleteCurrentChat;
    window.toggleTerminal = toggleTerminal;
    window.handleTerminalKey = handleTerminalKey;
    window.toggleReasoning = toggleReasoning;
    window.showUploadModal = showUploadModal;
    window.showTrainModal = showTrainModal;
    window.closeModal = closeModal;
    window.uploadFiles = uploadFiles;
    window.startTraining = startTraining;
    window.clearTerminal = clearTerminal;
</script>
</body>
</html>
